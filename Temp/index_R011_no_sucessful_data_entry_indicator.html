<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>揃い Soroi — Shop Floor Pickup</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#2563eb;--pri-dk:#1e40af;--pri-bg:rgba(37,99,235,.08);--pri-bg2:rgba(37,99,235,.14);--grn:#059669;--grn-bg:rgba(5,150,105,.08);--red:#dc2626;--red-bg:#fef2f2;--ylw:#d97706;--ylw-bg:#fffbeb;--card:#fff;--t1:#1e293b;--t2:#64748b;--t3:#94a3b8;--brd:#e2e8f0;--bg:#f1f5f9;--r:10px;--ok-bg:#f0fdf4;--ok:#15803d;--err-bg:#fef2f2;--err:#b91c1c;--sb:env(safe-area-inset-bottom,0px);--add-grad:linear-gradient(135deg,#eff6ff,#f0fdf4);--add-brd:#bfdbfe;--login-sh:rgba(37,99,235,.3)}
/* 🔵 Default Blue */
body.theme-default{--pri:#2563eb;--pri-dk:#1e40af;--pri-bg:rgba(37,99,235,.08);--pri-bg2:rgba(37,99,235,.14);--bg:#f1f5f9;--card:#fff;--t1:#1e293b;--t2:#64748b;--t3:#94a3b8;--brd:#e2e8f0;--add-grad:linear-gradient(135deg,#eff6ff,#f0fdf4);--add-brd:#bfdbfe;--login-sh:rgba(37,99,235,.3)}
/* 🛒 Market */
body.theme-market{--pri:#059669;--pri-dk:#047857;--pri-bg:rgba(5,150,105,.08);--pri-bg2:rgba(5,150,105,.14);--bg:#faf7f2;--card:#fffdf7;--t1:#1c1917;--t2:#78716c;--t3:#a8a29e;--brd:#e7e5e4;--add-grad:linear-gradient(135deg,#f0fdf4,#fefce8);--add-brd:#86efac;--login-sh:rgba(5,150,105,.3)}
body.theme-market .bar{background:var(--card);border-bottom:2px solid var(--pri)}
body.theme-market .login-ico{background:linear-gradient(135deg,#059669,#047857)}
body.theme-market .ucard{border-top-color:var(--pri)!important}
/* 🏴‍☠️ Treasure Hunt */
body.theme-treasure{--pri:#d97706;--pri-dk:#b45309;--pri-bg:rgba(217,119,6,.1);--pri-bg2:rgba(217,119,6,.16);--bg:#1a1a2e;--card:#16213e;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--brd:#334155;--add-grad:linear-gradient(135deg,rgba(217,119,6,.08),rgba(245,158,11,.06));--add-brd:#92400e;--login-sh:rgba(217,119,6,.4);--ok-bg:rgba(5,150,105,.15);--ok:#34d399;--err-bg:rgba(220,38,38,.15);--err:#fca5a5}
body.theme-treasure .bar{background:var(--card);border:1px solid var(--brd);box-shadow:0 2px 12px rgba(0,0,0,.3)}
body.theme-treasure .bar h1{color:var(--pri)}
body.theme-treasure .chip{background:var(--card);border-color:var(--brd);color:var(--t2)}
body.theme-treasure .lbtn{border-color:var(--brd);color:var(--t2)}
body.theme-treasure .card{background:var(--card);box-shadow:0 4px 16px rgba(0,0,0,.3)}
body.theme-treasure .login-ico{background:linear-gradient(135deg,#d97706,#92400e);box-shadow:0 12px 32px rgba(217,119,6,.4)}
body.theme-treasure .login-h span{color:var(--pri)}
body.theme-treasure .login-btn{background:var(--pri);color:#1a1a2e}.login-btn:hover{background:var(--pri-dk)}
body.theme-treasure .ucard{background:var(--card);border-color:var(--brd);border-top-color:var(--pri)!important}
body.theme-treasure .ucard:hover{border-color:var(--pri);box-shadow:0 4px 16px rgba(217,119,6,.2)}
body.theme-treasure .ucard h3{color:var(--t1)}
body.theme-treasure .ctbl th{background:#1e293b;color:var(--t2);border-color:var(--brd)}
body.theme-treasure .ctbl td{border-color:var(--brd);color:var(--t1)}
body.theme-treasure .stp-lb{background:var(--card);color:var(--t2);border-color:var(--brd)}
body.theme-treasure .stp-sid{background:var(--card);color:var(--t1);border-color:var(--brd)}
body.theme-treasure .add-row input{background:var(--card);color:var(--t1);border-color:var(--pri)}
body.theme-treasure .shdr h2{color:var(--t1)}
body.theme-treasure .modal{background:var(--card);color:var(--t1)}
body.theme-treasure .modal textarea{background:#1a1a2e;color:var(--t1);border-color:var(--pri)}
body.theme-treasure .mbtn-cancel{background:var(--brd);color:var(--t2)}
body.theme-treasure .action-btn{background:var(--card);border-color:var(--brd);color:var(--t2)}
body.theme-treasure .sa-chip{background:var(--card);border-color:var(--brd);color:var(--t1)}
body.theme-treasure .u-chip{background:var(--card);border-color:var(--brd);color:var(--t1)}
body.theme-treasure .u-chip.u-on{background:var(--pri);color:#1a1a2e}
body.theme-treasure .pk-divider-label{background:var(--card)}
body.theme-treasure .vfy-item{border-color:var(--brd)}
body.theme-treasure .vfy-btn{background:var(--card);border-color:var(--brd)}
body.theme-treasure .vfy-pn{color:var(--t1)}.vfy-qty{color:var(--t1)}
/* Settings modal */
.settings-section{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--brd)}.settings-section:last-child{border-bottom:none}
.settings-section h3{font-size:.88rem;font-weight:700;color:var(--t1);margin-bottom:10px}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.s-row span{font-size:.85rem;color:var(--t1)}
.s-val{font-size:.85rem;color:var(--pri);font-weight:600}
/* Theme picker */
.theme-grid{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.theme-card{flex:1;min-width:90px;padding:10px 8px;border:2.5px solid var(--brd);border-radius:10px;text-align:center;cursor:pointer;transition:all .15s;background:var(--card)}
.theme-card:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.theme-card.active{border-color:var(--pri);box-shadow:0 0 0 2px var(--pri-bg)}
.theme-card .tc-dot{width:32px;height:32px;border-radius:50%;margin:0 auto 6px}
.theme-card .tc-name{font-size:.72rem;font-weight:700}
.theme-card .tc-ico{font-size:1.2rem;margin-bottom:4px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);min-height:100dvh;color:var(--t1);transition:background .3s,color .3s}
button{font:inherit;cursor:pointer;border:none;background:none}
input,select{font:inherit}
a{color:inherit;text-decoration:none}
.shell{max-width:700px;margin:0 auto;padding:16px}
.bar{background:var(--card);border-radius:var(--r);padding:14px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.bar-left{display:flex;align-items:center;gap:10px}
.bar h1{font-size:1.1rem;font-weight:700}
.bar-right{display:flex;align-items:center;gap:8px}
.chip{font-size:.8rem;color:var(--t2);background:#f8fafc;padding:4px 10px;border-radius:20px;border:1px solid var(--brd)}
.chip .rt{font-weight:600;color:var(--pri);margin-left:4px}
.lbtn{background:none;border:1px solid var(--brd);color:var(--t2);padding:5px 10px;border-radius:6px;font-size:.75rem;cursor:pointer}.lbtn:hover{border-color:var(--pri);color:var(--pri)}
.abtn{background:var(--pri-bg);border:none;border-radius:8px;padding:5px 10px;font-size:.78rem;cursor:pointer;color:var(--pri);font-weight:600;display:inline-flex;align-items:center;gap:4px}.abtn:hover{background:var(--pri-bg2)}
.hdr-ico{width:32px;height:32px;border-radius:8px;border:1px solid var(--brd);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .12s}.hdr-ico:hover{border-color:var(--pri);background:var(--pri-bg)}
.card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.shdr h2{font-size:1.05rem;font-weight:700}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-dk)}
.btn-g{background:var(--grn);color:#fff}.btn-g:hover{background:#047857}
.btn-s{background:var(--pri-bg);color:var(--pri)}.btn-s:hover{background:var(--pri-bg2)}
.btn-d{background:var(--err-bg);color:var(--err)}.btn-d:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:.8rem}
.spinner{border:3px solid #e2e8f0;border-top:3px solid var(--pri);border-radius:50%;width:36px;height:36px;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Login */
#sec-login{text-align:center;padding:40px 20px}
.login-ico{width:80px;height:80px;border-radius:20px;margin:0 auto 16px;background:var(--pri);display:flex;align-items:center;justify-content:center;font-size:2.2rem;box-shadow:0 12px 32px var(--login-sh);color:#fff}
.login-h{font-size:1.6rem;font-weight:800;margin-bottom:4px}.login-h span{color:var(--pri)}
.login-p{color:var(--t3);margin-bottom:20px;font-size:.9rem}
.login-btn{background:var(--pri);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:10px}.login-btn:hover{background:var(--pri-dk)}
#login-error{color:var(--err);margin-top:14px;display:none;font-size:.9rem}
/* Unit grid */
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.ucard{border:2px solid var(--brd);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .15s}
.ucard:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ucard .ico{font-size:2.2rem;margin-bottom:8px}
.ucard h3{font-size:.95rem;font-weight:700;margin-bottom:4px}
.ucard p{font-size:.78rem;color:var(--t3)}
/* Pickup */
.pk-info{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pk-tag{font-size:.78rem;padding:4px 12px;border-radius:16px;background:var(--pri-bg);color:var(--pri);font-weight:600}
/* Sub-assembly chips */
.sa-section{margin-bottom:10px}
.sa-title{font-size:.78rem;font-weight:600;color:var(--t2);margin-bottom:8px}
.sa-chips{display:flex;flex-wrap:wrap;gap:6px}
/* Unit chips */
.u-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.u-chip{padding:10px 16px;border-radius:10px;font-size:.85rem;font-weight:700;border:2px solid var(--brd);background:var(--card);cursor:pointer;transition:all .15s;color:var(--t1);display:flex;align-items:center;gap:8px}
.u-chip:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-bg)}
.u-chip:active{transform:scale(.96)}
.u-chip.u-on{border-color:var(--pri);background:var(--pri);color:#fff}
.u-chip .u-ico{font-size:1.2rem}
/* SA chips */
.sa-chip{padding:8px 14px;border-radius:10px;font-size:.8rem;font-weight:600;border:2px solid var(--brd);background:var(--card);cursor:pointer;transition:all .15s;color:var(--t1);display:flex;align-items:center;gap:6px}
.sa-chip:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-bg)}
.sa-chip:active{transform:scale(.96)}
.sa-chip .sa-cnt{font-size:.68rem;padding:1px 6px;border-radius:8px;background:var(--pri-bg);color:var(--pri);font-weight:700}
.sa-chip.sa-added{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);opacity:.6;pointer-events:none}
.sa-chip.sa-drill{border-color:var(--pri);background:var(--pri-bg);color:var(--pri)}
/* Breadcrumb inside bulk */
.bulk-bread{display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--t2);margin-bottom:8px;flex-wrap:wrap}
.bulk-bread a{color:var(--pri);cursor:pointer;font-weight:600;text-decoration:none}.bulk-bread a:hover{text-decoration:underline}
.bulk-bread .sep{color:var(--t3)}
/* Bulk panel (like Part Inventory) */
.bulk-panel{border:2px solid var(--brd);border-radius:12px;margin-bottom:14px;overflow:hidden}
.bulk-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--pri-bg);cursor:pointer;user-select:none}
.bulk-header h3{font-size:.88rem;font-weight:700;color:var(--pri);display:flex;align-items:center;gap:6px}
.bulk-header .toggle-ico{font-size:.7rem;transition:transform .2s}
.bulk-header .toggle-ico.collapsed{transform:rotate(-90deg)}
.bulk-summary{font-size:.72rem;color:var(--t2);font-weight:600}
.bulk-body{padding:14px 16px;display:none;border-top:1px solid var(--brd)}.bulk-body.open{display:block}
.bulk-field{margin-bottom:10px}
.bulk-field label{display:block;font-size:.72rem;font-weight:600;color:var(--t2);margin-bottom:4px}
.bulk-field select{width:100%;padding:8px 10px;border:1.5px solid var(--brd);border-radius:8px;font-size:.88rem;background:var(--card);color:var(--t1)}.bulk-field select:focus{outline:none;border-color:var(--pri)}
/* Divider */
.pk-divider{height:1px;background:var(--brd);margin:14px 0}
.pk-divider-label{font-size:.72rem;color:var(--t3);text-align:center;margin:-8px auto 10px;background:var(--card);display:inline-block;padding:0 10px;position:relative;left:50%;transform:translateX(-50%)}
.add-box{background:var(--add-grad);border:2px solid var(--add-brd);border-radius:12px;padding:16px;margin-bottom:16px}
.add-box h3{font-size:.9rem;font-weight:700;color:var(--pri);margin-bottom:10px}
.add-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.add-row input{flex:1;min-width:120px;padding:10px 12px;border:2px solid var(--pri);border-radius:8px;font-size:.95rem;font-weight:500}
.add-row input:focus{outline:none;border-color:var(--pri-dk)}
.add-row input.qty{width:70px;flex:none;text-align:center}
/* Cart table */
.ctbl{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:12px}
.ctbl th{text-align:left;padding:6px 10px;background:#f8fafc;border:1px solid var(--brd);font-weight:700;font-size:.72rem;text-transform:uppercase;color:var(--t2)}
.ctbl td{padding:6px 10px;border:1px solid var(--brd)}
.ctbl .pn{font-family:monospace;font-weight:600}
.ctbl .qc{width:50px;text-align:center;font-weight:700}
.ctbl .act{width:36px;text-align:center}
.ctbl .dbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:1rem;padding:2px 4px;border-radius:4px}.ctbl .dbtn:hover{color:var(--err)}
/* Settings */
.stp{margin-bottom:16px}
.stp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stp-label{font-size:.78rem;font-weight:600;color:var(--t2);min-width:70px;flex-shrink:0}
.stp-lang{display:flex;border-radius:6px;overflow:hidden;border:1.5px solid var(--brd)}
.stp-lb{padding:6px 14px;font-size:.78rem;font-weight:700;cursor:pointer;background:#fff;color:var(--t2);border:none}.stp-lb.on{background:var(--pri);color:#fff}
.stp-sid{flex:1;padding:7px 10px;border:1.5px solid var(--brd);border-radius:6px;font-size:.78rem;font-family:monospace;min-width:0}.stp-sid:focus{outline:none;border-color:var(--pri)}
/* Status */
.status{padding:10px 14px;border-radius:8px;margin-top:10px;text-align:center;font-size:.88rem;font-weight:500;display:none}
.status.ok{background:var(--ok-bg);color:var(--ok);display:block}
.status.err{background:var(--err-bg);color:var(--err);display:block}
.status.loading{background:var(--pri-bg);color:var(--pri);display:block}
.empty{text-align:center;padding:40px;color:var(--t3)}.empty .ico{font-size:2rem;margin-bottom:8px}
/* Modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}.modal-overlay.active{display:flex}
.modal{background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:450px;max-height:85vh;overflow-y:auto;color:var(--t1)}
.modal h2{font-size:1.05rem;font-weight:700;margin-bottom:8px}
.modal p{color:var(--t2);font-size:.85rem;margin-bottom:12px}
.modal textarea{width:100%;min-height:120px;padding:12px;border:2px solid var(--pri);border-radius:8px;font-size:.9rem;font-family:monospace;resize:vertical;background:var(--card);color:var(--t1)}.modal textarea:focus{outline:none;border-color:var(--pri-dk)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;border:none;font-size:.88rem;font-weight:600;cursor:pointer}
.mbtn-cancel{background:var(--pri-bg);color:var(--t2)}
.mbtn-confirm{background:var(--pri);color:#fff}
/* Action buttons */
.action-row{display:flex;gap:8px;margin-bottom:12px}
.action-btn{flex:1;padding:10px;border-radius:10px;border:2px solid var(--brd);background:var(--card);font-size:.82rem;font-weight:600;cursor:pointer;text-align:center;color:var(--t2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.action-btn:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-bg)}
.action-btn.active{border-color:var(--pri);color:var(--pri);background:var(--pri-bg)}
/* Verification mode */
.vfy-progress{margin-bottom:14px}
.vfy-bar{height:8px;background:var(--brd);border-radius:4px;overflow:hidden;margin-top:6px}
.vfy-fill{height:100%;border-radius:4px;transition:width .3s}
.vfy-stats{display:flex;gap:12px;font-size:.78rem;font-weight:600;margin-bottom:4px}
.vfy-stats .vs-picked{color:var(--ok)}.vfy-stats .vs-missing{color:var(--err)}.vfy-stats .vs-pending{color:var(--t3)}
.vfy-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--brd);transition:all .2s}
.vfy-item:last-child{border-bottom:none}
.vfy-item.vfy-picked{background:var(--ok-bg)}
.vfy-item.vfy-missing{background:var(--err-bg)}
.vfy-num{width:24px;font-size:.72rem;color:var(--t3);text-align:center;flex-shrink:0}
.vfy-body{flex:1;min-width:0}
.vfy-pn{font-family:monospace;font-weight:600;font-size:.88rem;color:var(--t1)}.vfy-picked .vfy-pn{text-decoration:line-through;color:var(--t3)}
.vfy-name{font-size:.75rem;color:var(--t2);margin-top:1px}.vfy-picked .vfy-name{text-decoration:line-through;color:var(--t3)}
.vfy-qty{font-weight:700;font-size:.88rem;color:var(--t1);min-width:32px;text-align:center;flex-shrink:0}
.vfy-btns{display:flex;gap:4px;flex-shrink:0}
.vfy-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:2px solid var(--brd);background:var(--card);font-size:1rem;cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent}
.vfy-btn:active{transform:scale(.92)}
.vfy-btn.vb-pick{color:var(--t3)}.vfy-btn.vb-pick:hover{border-color:var(--ok);color:var(--ok)}
.vfy-btn.vb-pick.on{background:var(--ok);border-color:var(--ok);color:#fff;box-shadow:0 2px 6px rgba(5,150,105,.3)}
.vfy-btn.vb-miss{color:var(--t3)}.vfy-btn.vb-miss:hover{border-color:var(--err);color:var(--err)}
.vfy-btn.vb-miss.on{background:var(--err);border-color:var(--err);color:#fff;box-shadow:0 2px 6px rgba(220,38,38,.3)}
.vfy-submit{display:flex;gap:8px;margin-top:14px}
.vfy-submit button{flex:1;padding:12px;border-radius:10px;border:none;font-size:.88rem;font-weight:700;cursor:pointer}
.vfy-sub-go{background:var(--pri);color:#fff}.vfy-sub-go:hover{filter:brightness(1.1)}
.vfy-sub-back{background:var(--pri-bg);color:var(--pri)}
@media(max-width:600px){.shell{padding:10px}.bar{padding:12px 14px}.card{padding:14px}.ugrid{grid-template-columns:1fr 1fr}.add-row{flex-direction:column}.add-row input.qty{width:100%}}
</style>
</head>
<body class="theme-default">
<div class="shell">
    <!-- BAR (static) -->
    <div class="bar">
        <div class="bar-left">
            <h1 id="pg-title">🛒 揃い Soroi</h1>
        </div>
        <div class="bar-right" id="bar-right" style="display:none">
            <span class="chip" id="user-chip" style="display:none"></span>
            <button class="hdr-ico" onclick="openSettingsModal()" title="Settings">⚙️</button>
            <button class="lbtn" id="login-btn" onclick="doLogin()" style="display:none">Sign In</button>
            <button class="lbtn" id="logout-btn" onclick="doLogout()" style="display:none">Out</button>
        </div>

function initGIS(){
    if(typeof google==='undefined'||!google.accounts){setTimeout(initGIS,300);return;}
    gisTokenClient=google.accounts.oauth2.initTokenClient({
        client_id:GIS_CID,scope:'https://www.googleapis.com/auth/spreadsheets',
        callback:r=>{if(r.access_token){sheetsToken=r.access_token;localStorage.setItem('gis_sheets_token',sheetsToken);console.log('GIS: token obtained');}}
    });
    console.log('GIS: initialized');
}

function gisReAuth(){
    return new Promise((resolve,reject)=>{
        if(!gisTokenClient){reject(new Error('GIS not ready'));return;}
        let done=false;
        const origCb=gisTokenClient.callback;
        gisTokenClient.callback=r=>{
            if(done)return;done=true;gisTokenClient.callback=origCb;
            if(r.access_token){sheetsToken=r.access_token;localStorage.setItem('gis_sheets_token',sheetsToken);resolve();}
            else reject(new Error('Token failed'));
        };
        gisTokenClient.requestAccessToken({prompt:''});
        setTimeout(()=>{if(!done){done=true;gisTokenClient.callback=origCb;reject(new Error('Re-auth timeout'));}},15000);
    });
}

function gisRequestToken(){
    if(!gisTokenClient){alert('Google auth loading. Try again in a few seconds.');return;}
    gisTokenClient.requestAccessToken();
}

async function sheetsApi(url,options={},isRetry=false){
    if(!sheetsToken)sheetsToken=localStorage.getItem('gis_sheets_token');
    if(!sheetsToken)throw new Error('NEEDS_GIS_AUTH');
    const r=await fetch(url,{...options,headers:{'Authorization':'Bearer '+sheetsToken,'Content-Type':'application/json',...(options.headers||{})}});
    if(r.status===401&&!isRetry){
        try{await gisReAuth();return sheetsApi(url,options,true);}catch(e){
            sheetsToken=null;localStorage.removeItem('gis_sheets_token');throw new Error('NEEDS_GIS_AUTH');
        }
    }
    if(!r.ok){const txt=await r.text();throw new Error('Sheets '+r.status+': '+txt);}
    return r.json();
}

// BOM helpers
function getChildSet(){var s=new Set();bom.forEach(b=>{if(b.parent_id)s.add(b.parent_id);});return s;}
function getSubAssemblies(){var cs=getChildSet();return bom.filter(b=>cs.has(b.id)&&b.level>=2);}
function getDirectChildren(pid){return bom.filter(b=>b.parent_id===pid);}
function hasChildren(id){return bom.some(b=>b.parent_id===id);}
function getLeaves(pid){
    var out=[];bom.forEach(b=>{if(isDesc(b.id,pid)&&!bom.some(c=>c.parent_id===b.id))out.push(b);});return out;
}
function isDesc(id,anc){var cur=bom.find(b=>b.id===id);while(cur){if(cur.parent_id===anc)return true;cur=bom.find(b=>b.id===cur.parent_id);}return false;}

function renderHome(){
    const el=$('sec-home');
    var addedGroups=new Set(cart.filter(c=>c._group).map(c=>c._group));
    var GC=['#2e7d32','#1565c0','#c62828','#6a1b9a','#e65100','#00838f','#f57f17','#4e342e','#283593','#bf360c'];

    let h='<div class="card">';

    // === BULK SETTINGS PANEL ===
    h+='<div class="bulk-panel">';
    h+='<div class="bulk-header" onclick="toggleBulk()">';
    h+='<h3>'+t('bulkSection')+' <span class="toggle-ico'+(bulkOpen?'':' collapsed')+'">▼</span></h3>';
    var summary=selUnit?esc(selUnit.icon||'📦')+' '+esc(selUnit.name):'—';
    h+='<span class="bulk-summary">'+summary+'</span>';
    h+='</div>';
    h+='<div class="bulk-body'+(bulkOpen?' open':'')+'">';

    // Unit chips
    h+='<div class="sa-title">'+t('selectUnit')+'</div>';
    h+='<div class="u-chips">';
    units.forEach(u=>{
        var on=selUnit&&selUnit.id===u.id;
        h+='<div class="u-chip'+(on?' u-on':'')+'" onclick="onUnitChip(\''+u.id+'\')">';
        h+='<span class="u-ico">'+esc(u.icon||'📦')+'</span>'+esc(u.name)+'</div>';
    });
    if(!units.length)h+='<span style="color:var(--t3);font-size:.82rem">'+t('noUnits')+'</span>';
    h+='</div>';

    // Sub-assembly chips (hierarchical)
    if(selUnit&&bom.length){
        var cs=getChildSet();
        // Determine which level to show
        var parentId=selSubAssy||null;
        var children=parentId?getDirectChildren(parentId):bom.filter(b=>(b.level===1&&cs.has(b.id))?false:!b.parent_id||(b.level===2));
        // If we have a parentId, get direct children
        if(parentId)children=getDirectChildren(parentId);
        else children=bom.filter(b=>b.level<=2&&cs.has(b.id));
        var groups=children.filter(b=>cs.has(b.id));
        var leafChildren=children.filter(b=>!cs.has(b.id));

        if(groups.length||leafChildren.length){
            // Breadcrumb
            if(selSubAssy){
                h+='<div class="bulk-bread"><a onclick="drillTo(null)">'+esc(selUnit.name)+'</a>';
                // Build breadcrumb path
                var path=[];var cur=bom.find(b=>b.id===selSubAssy);
                while(cur){path.unshift(cur);var p=bom.find(b=>b.id===cur.parent_id);if(!p||p.level<2)break;cur=p;}
                path.forEach((p,i)=>{
                    h+='<span class="sep">›</span>';
                    if(i<path.length-1)h+='<a onclick="drillTo(\''+p.id+'\')">'+esc(p.component)+'</a>';
                    else h+='<span style="color:var(--t1);font-weight:600">'+esc(p.component)+'</span>';
                });
                h+='</div>';
            }

            h+='<div class="sa-section">';
            if(!selSubAssy)h+='<div class="sa-title">'+t('bulkHint')+'</div>';
            h+='<div class="sa-chips">';
            // Groups (have children — drill into)
            groups.forEach((g,i)=>{
                var leaves=getLeaves(g.id);
                var added=addedGroups.has(g.id);
                var clr=GC[(i)%GC.length];
                if(added){
                    h+='<div class="sa-chip sa-added" style="border-left:4px solid '+clr+'">'+esc(g.component)+' <span class="sa-cnt">'+leaves.length+'</span> ✓</div>';
                }else{
                    // Check if it has sub-groups to drill, or just leaves
                    var subGroups=getDirectChildren(g.id).filter(c=>cs.has(c.id));
                    if(subGroups.length){
                        // Has sub-sub-assemblies — drill
                        h+='<div class="sa-chip" onclick="drillTo(\''+g.id+'\')" style="border-left:4px solid '+clr+'">'+esc(g.component)+' <span class="sa-cnt">'+leaves.length+'</span> ›</div>';
                    }else{
                        // Leaf group — add directly
                        h+='<div class="sa-chip" onclick="addSubAssembly(\''+g.id+'\')" style="border-left:4px solid '+clr+'">'+esc(g.component)+' <span class="sa-cnt">'+leaves.length+'</span></div>';
                    }
                }
            });
            // Leaf parts at this level (can add individually)
            leafChildren.forEach(p=>{
                h+='<div class="sa-chip" onclick="addSingleBomPart(\''+p.id+'\')" style="border-left:4px solid var(--t3)">'+esc(p.component)+' <span class="sa-cnt">×'+p.qty+'</span></div>';
            });
            h+='</div></div>';
        }

        h+='<div style="text-align:center;padding:12px;color:var(--t3);font-size:.82rem"><div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0 auto 6px"></div>'+t('loadingBom')+'</div>';
    }
    h+='</div></div>'; // end bulk-body, bulk-panel

    // === PASTE LIST + ADD PART ===
    h+='<div class="action-row">';
    h+='<button class="action-btn" onclick="openPasteModal()">'+t('pasteList')+'</button>';
    h+='<button class="action-btn" onclick="toggleAddBox()">'+t('addPart')+'</button>';
    h+='</div>';
    h+='<div class="add-box" id="add-box" style="display:'+(addBoxOpen?'block':'none')+'">';
    h+='<div class="add-row"><input id="inp-pn" placeholder="'+t('pnPh')+'" style="font-family:monospace" onkeydown="if(event.key===\'Enter\')addToCart()"><input id="inp-name" placeholder="'+t('namePh')+'" onkeydown="if(event.key===\'Enter\')addToCart()"><input id="inp-qty" class="qty" type="number" value="1" min="1" placeholder="'+t('qtyPh')+'" onkeydown="if(event.key===\'Enter\')addToCart()"></div>';
    h+='<button class="btn btn-p" onclick="addToCart()">'+t('add')+'</button>';
    h+='</div>';

    // === PICKUP LIST ===
    h+='<div class="shdr" style="margin-top:12px"><h2>'+t('cart')+' ('+cart.length+')</h2>';
    if(cart.length)h+='<button class="btn btn-d btn-sm" onclick="cart=[];renderHome()">'+t('clear')+'</button>';
    h+='</div>';
    if(cart.length){
        h+='<table class="ctbl"><thead><tr><th class="act"></th><th>#</th><th>'+t('pnPh')+'</th><th>'+t('namePh')+'</th><th>'+t('qtyPh')+'</th></tr></thead><tbody>';
        cart.forEach((c,i)=>{
            h+='<tr><td class="act"><button class="dbtn" onclick="removeCartItem('+i+')">✕</button></td><td>'+(i+1)+'</td><td class="pn">'+esc(c.pn)+'</td><td>'+esc(c.name)+'</td><td class="qc">'+c.qty+'</td></tr>';
        });
        h+='</tbody></table>';
        h+='<button class="btn btn-g" onclick="startVerify()" style="width:100%">'+t('startVerify')+'</button>';
    }else{
        h+='<div class="empty"><div class="ico">📋</div><p>'+t('noItems')+'</p></div>';
    }
    h+='<div class="status" id="pk-status"></div>';
    h+='</div>';
    el.innerHTML=h;
    if(addBoxOpen)setTimeout(()=>{const inp=$('inp-pn');if(inp)inp.focus();},50);
}

// Unit chip handler
async function onUnitChip(id){
    if(selUnit&&selUnit.id===id){selUnit=null;bom=[];selSubAssy=null;renderHome();return;}
    selUnit=units.find(u=>u.id===id);
    if(!selUnit)return;
    bom=[];selSubAssy=null;renderHome();
    await loadBom(id);
    renderHome();
}

// Drill into sub-assembly
function drillTo(id){selSubAssy=id;renderHome();}

// Add single BOM part
function addSingleBomPart(bid){
    var b=bom.find(p=>p.id===bid);if(!b)return;
    var desc=b.component||'';
    if(b.part_number&&desc.startsWith(b.part_number))desc=desc.substring(b.part_number.length).replace(/^[\s\-–—]+/,'');
    // Find parent group name
    var parent=bom.find(p=>p.id===b.parent_id);
    cart.push({pn:b.part_number||'',name:desc||b.part_number||'',qty:b.qty||1,_group:null,_groupName:parent?parent.component:'',_unitName:selUnit?selUnit.name:''});
    renderHome();
}

function toggleBulk(){bulkOpen=!bulkOpen;renderHome();}

function goHome(){nav('home');}

function addSubAssembly(gid){
    var g=bom.find(b=>b.id===gid);if(!g)return;
    var leaves=getLeaves(gid);if(!leaves.length)return;
    leaves.forEach(p=>{
        var desc=p.component||'';
        if(p.part_number&&desc.startsWith(p.part_number))desc=desc.substring(p.part_number.length).replace(/^[\s\-–—]+/,'');
        cart.push({pn:p.part_number||'',name:desc||p.part_number||'',qty:p.qty||1,_group:gid,_groupName:g.component||'',_unitName:selUnit?selUnit.name:''});
    });
    showSt('pk-status','✅ '+leaves.length+' '+t('partsAdded')+' — '+g.component,'ok');
    renderHome();
    setTimeout(()=>{const s=$('pk-status');if(s)s.className='status';},3000);
}

function addAllGroups(){
    var cs=getChildSet();
    var addedGroups=new Set(cart.filter(c=>c._group).map(c=>c._group));
    var groups=bom.filter(b=>cs.has(b.id)&&b.level>=2&&!addedGroups.has(b.id));
    // Only add leaf groups (groups that don't contain sub-groups, or all groups recursively)
    var total=0;
    groups.forEach(g=>{
        var subGroups=getDirectChildren(g.id).filter(c=>cs.has(c.id));
        if(!subGroups.length){
            // Leaf group — add its parts
            var leaves=getLeaves(g.id);
            leaves.forEach(p=>{
                var desc=p.component||'';
                if(p.part_number&&desc.startsWith(p.part_number))desc=desc.substring(p.part_number.length).replace(/^[\s\-–—]+/,'');
                cart.push({pn:p.part_number||'',name:desc||p.part_number||'',qty:p.qty||1,_group:g.id,_groupName:g.component||'',_unitName:selUnit?selUnit.name:''});
            });
            total+=leaves.length;
        }
    });
    // If no leaf groups found, add ALL leaves from all groups
    if(!total){
        groups.forEach(g=>{
            var leaves=getLeaves(g.id);
            leaves.forEach(p=>{
                var desc=p.component||'';
                if(p.part_number&&desc.startsWith(p.part_number))desc=desc.substring(p.part_number.length).replace(/^[\s\-–—]+/,'');
                cart.push({pn:p.part_number||'',name:desc||p.part_number||'',qty:p.qty||1,_group:g.id,_groupName:g.component||'',_unitName:selUnit?selUnit.name:''});
            });
            total+=leaves.length;
        });
    }
    if(total)showSt('pk-status','✅ '+total+' '+t('partsAdded'),'ok');
    renderHome();
    setTimeout(()=>{const s=$('pk-status');if(s)s.className='status';},3000);
}

function removeCartItem(idx){
    cart.splice(idx,1);
    renderHome();
}

function addToCart(){
    const pn=($('inp-pn').value||'').trim();
    const name=($('inp-name').value||'').trim();
    const qty=parseInt($('inp-qty').value)||1;
    if(!pn&&!name)return;
    cart.push({pn:pn,name:name||pn,qty:qty,_group:null,_groupName:'',_unitName:selUnit?selUnit.name:''});
    renderHome();
}

function toggleAddBox(){addBoxOpen=!addBoxOpen;renderHome();}

// Paste List Modal
function openPasteModal(){
    $('paste-title').textContent=t('pasteTitle');
    $('paste-desc').textContent=t('pasteDesc');
    $('paste-textarea').value='';
    $('paste-modal').classList.add('active');
    setTimeout(()=>{$('paste-textarea').focus();},100);
}
function closePasteModal(){$('paste-modal').classList.remove('active');}
function processPastedList(){
    const lines=$('paste-textarea').value.split('\n').map(l=>l.trim()).filter(l=>l);
    if(!lines.length)return;
    let added=0;
    lines.forEach(line=>{
        let pn,qty=1;
        if(line.includes('\t')){const p=line.split('\t');pn=p[0].trim();qty=parseInt(p[1])||1;}
        else if(line.includes(',')){const p=line.split(',');pn=p[0].trim();qty=parseInt(p[1])||1;}
        else if(/\s+\d+$/.test(line)){const m=line.match(/^(.+?)\s+(\d+)$/);pn=m[1].trim();qty=parseInt(m[2])||1;}
        else{pn=line;}
        if(!pn)return;
        cart.push({pn:pn,name:pn,qty:qty,_group:null,_groupName:'',_unitName:selUnit?selUnit.name:''});
        added++;
    });
    closePasteModal();
    if(added)showSt('pk-status','✅ '+added+' '+t('pasted'),'ok');
    renderHome();
    setTimeout(()=>{const s=$('pk-status');if(s)s.className='status';},3000);
}

// =====================================================
// VERIFICATION MODE
// =====================================================
function startVerify(){
    if(!cart.length)return;
    // Initialize status for each item: null=pending, 'picked', 'missing'
    cart.forEach(c=>{if(!c.status)c.status=null;});
    verifyMode=true;
    nav('verify');
}

function backToCart(){
    verifyMode=false;
    nav('home');
}

function markItem(idx,status){
    if(idx<0||idx>=cart.length)return;
    cart[idx].status=(cart[idx].status===status)?null:status;
    renderVerify();
}

function markAll(status){
    cart.forEach(c=>{c.status=status;});
    renderVerify();
}

function renderVerify(){
    if(!selUnit||!cart.length)return;
    const el=$('sec-verify');
    const picked=cart.filter(c=>c.status==='picked').length;
    const missing=cart.filter(c=>c.status==='missing').length;
    const pending=cart.length-picked-missing;
    const pct=Math.round((picked+missing)/cart.length*100);
    const allDone=pending===0;

    let h='<div class="card">';
    // Header
    h+='<div class="shdr"><h2>'+(selUnit.icon||'📦')+' '+t('verifyTitle')+'</h2><button class="btn btn-s btn-sm" onclick="backToCart()">'+t('backToCart')+'</button></div>';
    h+='<div class="pk-info"><span class="pk-tag">📅 '+today()+'</span><span class="pk-tag">👤 '+esc(user?(user.name||'').split(' ')[0]:'')+'</span><span class="pk-tag">'+esc(selUnit.name)+'</span></div>';
    // Progress
    h+='<div class="vfy-progress">';
    h+='<div class="vfy-stats"><span class="vs-picked">✅ '+picked+' '+t('picked')+'</span><span class="vs-missing">❌ '+missing+' '+t('missing')+'</span><span class="vs-pending">⏳ '+pending+' '+t('pending')+'</span></div>';
    var fillColor=allDone?(missing>0?'var(--ylw)':'var(--ok)'):'var(--pri)';
    h+='<div class="vfy-bar"><div class="vfy-fill" style="width:'+pct+'%;background:'+fillColor+'"></div></div>';
    h+='</div>';
    // Quick actions
    h+='<div style="display:flex;gap:6px;margin-bottom:12px">';
    h+='<button onclick="markAll(\'picked\')" style="flex:1;padding:8px;border-radius:8px;border:2px solid var(--ok);background:var(--ok-bg);color:var(--ok);font-size:.78rem;font-weight:700;cursor:pointer">✅ '+t('markAllPicked')+'</button>';
    h+='<button onclick="markAll(\'missing\')" style="flex:1;padding:8px;border-radius:8px;border:2px solid var(--err);background:var(--err-bg);color:var(--err);font-size:.78rem;font-weight:700;cursor:pointer">❌ '+t('markAllMissing')+'</button>';
    h+='<button onclick="markAll(null)" style="padding:8px 12px;border-radius:8px;border:2px solid var(--brd);background:var(--card);color:var(--t3);font-size:.78rem;font-weight:700;cursor:pointer">↩</button>';
    h+='</div>';
    // Items
    cart.forEach((c,i)=>{
        var cls=c.status==='picked'?'vfy-picked':c.status==='missing'?'vfy-missing':'';
        h+='<div class="vfy-item '+cls+'">';
        h+='<span class="vfy-num">'+(i+1)+'</span>';
        h+='<div class="vfy-body"><div class="vfy-pn">'+esc(c.pn||c.name)+'</div>';
        if(c.name&&c.name!==c.pn)h+='<div class="vfy-name">'+esc(c.name)+'</div>';
        h+='</div>';
        h+='<span class="vfy-qty">×'+c.qty+'</span>';
        h+='<div class="vfy-btns">';
        h+='<button class="vfy-btn vb-pick'+(c.status==='picked'?' on':'')+'" onclick="markItem('+i+',\'picked\')">✓</button>';
        h+='<button class="vfy-btn vb-miss'+(c.status==='missing'?' on':'')+'" onclick="markItem('+i+',\'missing\')">✕</button>';
        h+='</div></div>';
    });
    // Submit buttons
    h+='<div class="vfy-submit">';
    h+='<button class="vfy-sub-back" onclick="backToCart()">'+t('backToCart')+'</button>';
    if(allDone){
        h+='<button class="vfy-sub-go" onclick="submitToSheet()">'+t('submitVerified')+'</button>';
    }else{
        h+='<button class="vfy-sub-go" disabled style="opacity:.4;cursor:not-allowed">'+t('notAllVerified')+'</button>';
    }
    h+='</div>';
    if(allDone)h+='<div style="text-align:center;padding:10px;color:var(--ok);font-weight:600;font-size:.85rem">'+t('allDone')+'</div>';
    h+='<div class="status" id="pk-status"></div>';
    h+='</div>';
    el.innerHTML=h;
}

// =====================================================
// SUBMIT TO GOOGLE SHEETS (Part Inventory pattern)
// =====================================================
async function submitToSheet(){
    if(!cart.length)return;
    if(!sheetId){showSt('pk-status','Set Sheet ID in settings first','err');return;}
    showSt('pk-status',t('submitting'),'loading');
    try{
        const tab=selUnit?selUnit.name:'Pickup';
        const info=await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'?fields=sheets.properties.title');
        if(!info.sheets.some(s=>s.properties.title===tab)){
            await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+':batchUpdate',{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})});
            await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A1:H1?valueInputOption=RAW',{method:'PUT',body:JSON.stringify({values:[['Date','Operator','Part Number','Description','Qty','Unit','Sub-Assembly','Status']]})});
        }
        const col=await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A:A');
        const nextRow=(col.values?col.values.length:0)+1;
        // First name only
        var opName=user?(user.name||'').split(' ')[0]:'';
        const rows=cart.map(c=>[today(),opName,c.pn,c.name,c.qty,c._unitName||'',c._groupName||'',c.status||'picked']);
        await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A'+nextRow+':H'+(nextRow+rows.length-1)+'?valueInputOption=USER_ENTERED',{method:'PUT',body:JSON.stringify({values:rows})});
        const pickedN=cart.filter(c=>c.status==='picked').length;
        const missingN=cart.filter(c=>c.status==='missing').length;
        showSt('pk-status','✅ '+pickedN+' '+t('picked')+(missingN?', ❌ '+missingN+' '+t('missing'):''),'ok');
        cart=[];verifyMode=false;
        setTimeout(()=>{nav('home');},2000);
    }catch(e){
        console.error(e);
        if(e.message==='NEEDS_GIS_AUTH'){
            showSt('pk-status',t('needAuth'),'err');
            const st=$('pk-status');
            if(st)st.innerHTML+='<br><button onclick="gisRequestToken()" style="margin-top:8px;padding:8px 16px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">🔑 Connect Google Sheets</button>';
        }else{
            showSt('pk-status',t('submitErr')+': '+e.message,'err');
        }
    }
}
