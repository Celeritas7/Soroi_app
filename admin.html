async function parseAndImport(text){
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2){toast('Empty CSV','err');return;}
  // Parse header
  var hdr=lines[0].split(',').map(function(h){return h.trim().toLowerCase();});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCSVLine(lines[i]);
    var obj={};hdr.forEach(function(h,j){obj[h]=cols[j]||'';});
    rows.push(obj);
  }
  // Delete existing BOM for this unit
  toast('Importing...','');
  try{var delR=await sb.from('soroi_app_bom').delete().eq('unit_id',S.selUnit.id);if(delR.error)console.warn('Delete old BOM:',delR.error);}catch(e){console.warn('Delete old BOM exception:',e);}
  // Insert rows with hierarchy
  var nameToId={};var sortIdx=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var parentId=null;
    var parentName=(r.parent||'').trim();
    if(parentName&&nameToId[parentName])parentId=nameToId[parentName];
    var lv=parseInt((r.level||'').replace(/[^0-9]/g,''))||1;
    var ins={unit_id:S.selUnit.id,parent_id:parentId,seq:(r.seq||'').trim()||null,level:lv,component:(r.component||'').trim(),part_number:(r.part_number||'').trim()||null,qty:parseInt(r.qty)||1,status:(r.status||'NOT_STARTED').trim(),fastener:(r.fastener||'').trim()||null,f_qty:parseInt(r['f.qty']||r.f_qty)||null,loctite:(r.loctite||'').trim()||null,torque:(r.torque||'').trim()||null,sort_order:sortIdx++};
    try{
      var res=await sb.from('soroi_app_bom').insert(ins).select().single();
      if(res.error){console.error('Row '+i+' insert error:',res.error);}
      else if(res.data)nameToId[ins.component]=res.data.id;
    }catch(e){console.error('Row '+i+':',e);}
  }
  toast('Imported '+rows.length+' items!','ok');
  loadBom(S.selUnit.id);
}

function parseCSVLine(line){
  var result=[],cell='',inQuotes=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQuotes){if(c==='"'&&line[i+1]==='"'){cell+='"';i++;}else if(c==='"'){inQuotes=false;}else{cell+=c;}}
    else{if(c==='"'){inQuotes=true;}else if(c===','){result.push(cell.trim());cell='';}else{cell+=c;}}
  }
  result.push(cell.trim());return result;
}

// XLSX Import
function trigXLSX(){$('xlsxF').click();}
document.addEventListener('DOMContentLoaded',function(){
  $('xlsxF').addEventListener('change',function(e){
    var f=e.target.files[0];if(!f||!S.selUnit)return;
    var reader=new FileReader();
    reader.onload=function(ev){parseAndImportXLSX(ev.target.result);};
    reader.readAsArrayBuffer(f);e.target.value='';
  });
});

async function parseAndImportXLSX(data){
  if(typeof XLSX==='undefined'){toast('XLSX library not loaded','err');return;}
  try{
    var wb=XLSX.read(data,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var json=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!json.length){toast('Empty spreadsheet','err');return;}

    // Detect columns — handle both standard (14 cols) and A1A2 (15 cols) formats
    var firstRow=json[0];
    var keys=Object.keys(firstRow);
    var hasPNalt=keys.length>=15; // A1A2 format has extra column

    toast('Importing '+json.length+' parts...','');
    // Delete existing BOM for this unit
    try{await sb.from('soroi_app_bom').delete().eq('unit_id',S.selUnit.id);}catch(e){}

    var imported=0;
    for(var i=0;i<json.length;i++){
      var r=json[i];
      var pn=String(r['Part No']||r['Part_No']||r[keys[2]]||'').replace(/\n/g,'').trim();
      var desc=String(r['Description']||r[keys[hasPNalt?4:3]]||'').replace(/\n/g,'').trim();
      var qty=parseInt(r['QTY.']||r['QTY']||r[keys[hasPNalt?6:5]])||1;
      var seq=String(r['NO.']||r['NO']||r[keys[0]]||'').trim();
      var typ=r['Type']||r[keys[1]];
      var material=String(r['MATERIAL']||r[keys[hasPNalt?7:6]]||'').trim();
      var supplier=String(r['Supplier']||r[keys[hasPNalt?10:9]]||'').trim();
      if(!pn)continue;

      var ins={
        unit_id:S.selUnit.id,
        parent_id:null,
        seq:seq||null,
        level:1,
        component:desc||pn,
        part_number:pn,
        qty:qty,
        status:'NOT_STARTED',
        fastener:null,f_qty:null,loctite:null,torque:null,
        sort_order:i
      };
      try{
        var res=await sb.from('soroi_app_bom').insert(ins).select();
        if(res.error)console.error('XLSX row '+i+':',res.error);
        else imported++;
      }catch(e){console.error('XLSX row '+i+':',e);}
    }
    toast('Imported '+imported+' parts from XLSX!','ok');
    loadBom(S.selUnit.id);
  }catch(e){
    console.error('XLSX parse error:',e);
    toast('XLSX parse failed: '+e.message,'err');
  }
}

  h+='</div></div>';
  // Title
  h+='<div class="home-hdr fade"><h2>📂 Assembly Units</h2><p>'+(S.units.length?S.units.length+' unit'+(S.units.length>1?'s':''):'No units yet'+(S.isAdmin?' — create one below':''))+'</p></div>';
  // Cards
  h+='<div class="ugrid fade">';
  S.units.forEach(function(u,i){
    var c=u.color||colors[i%colors.length];
    h+='<div class="ucard" data-act="unit" data-id="'+u.id+'" style="border-top-color:'+c+'">';
    h+='<div class="ucard-main"><div class="ucard-ico" style="background:'+c+'18;color:'+c+'">'+esc(u.icon||'📦')+'</div>';
    h+='<div class="ucard-info"><div class="ucard-n">'+esc(u.name)+'</div><div class="ucard-sub">'+(u.description||'Tap to view BOM')+'</div></div></div>';
    if(S.isAdmin){
      h+='<div class="ucard-sep"></div><div class="ucard-acts">';
      h+='<button class="ucard-ab ucard-ab-e" onclick="event.stopPropagation();renameUnit(\''+u.id+'\',\''+esc(u.name).replace(/'/g,"\\'")+'\')">'+svg('pencil')+'</button>';
      h+='<button class="ucard-ab ucard-ab-d" onclick="event.stopPropagation();delUnit(\''+u.id+'\')">'+svg('trash')+'</button>';
      h+='</div>';
    }
    h+='</div>';
  });
  if(S.isAdmin)h+='<div class="ucard ucard-add" onclick="addUnit()">'+svg('plus')+'<span>New Unit</span></div>';
  h+='</div>';
  return h;
}

// ============ BOM TABLE VIEW ============
// Axon BOM color palette — cycles for L2 groups, children inherit
var GC=[
  {bg:'#2e7d32',light:'#e8f5e9',tint:'#f1f8f2'},
  {bg:'#1565c0',light:'#e3f2fd',tint:'#f0f7fd'},
  {bg:'#c62828',light:'#fce4ec',tint:'#fdf0f3'},
  {bg:'#6a1b9a',light:'#f3e5f5',tint:'#f8f0fa'},
  {bg:'#e65100',light:'#fff3e0',tint:'#fef8f0'},
  {bg:'#00838f',light:'#e0f7fa',tint:'#f0fbfc'},
  {bg:'#f57f17',light:'#fff8e1',tint:'#fffcf0'},
  {bg:'#4e342e',light:'#efebe9',tint:'#f7f5f4'},
  {bg:'#283593',light:'#e8eaf6',tint:'#f0f1fa'},
  {bg:'#bf360c',light:'#fbe9e7',tint:'#fdf3f1'}
];
var L1C={bg:'#1b5e20',light:'#c8e6c9',tint:'#e8f5e9'};
var DFC={bg:'#555',light:'#eee',tint:'#f9f9f9'};

function vBom(){
  var u=S.selUnit;if(!u)return '';
  var sorted=S.bom.slice().sort(function(a,b){return a.sort_order-b.sort_order;});
  var childSet=new Set();S.bom.forEach(function(b){if(b.parent_id)childSet.add(b.parent_id);});
  var totalParts=S.bom.filter(function(b){return !childSet.has(b.id);}).length;

  // Assign colors: L1=dark green, L2=cycling palette, children inherit
  var nc={};var ci=0;
  sorted.forEach(function(b){
    if(b.level===1&&childSet.has(b.id)){nc[b.id]=L1C;}
    else if(b.level===2&&childSet.has(b.id)){nc[b.id]=GC[ci%GC.length];ci++;}
  });
  function gClr(id){if(nc[id])return nc[id];var it=S.bom.find(function(b){return b.id===id;});if(it&&it.parent_id){var c=gClr(it.parent_id);nc[id]=c;return c;}return DFC;}
  S.bom.forEach(function(b){gClr(b.id);});

  // Header
  var h='<div class="hdr"><button class="hdr-bk" onclick="goBack()">'+svg('back')+'</button>';
  h+='<div class="hdr-b"><div class="hdr-t">📋 BOM — '+esc(u.name)+'</div><div class="hdr-s">'+totalParts+' parts</div></div>';
  h+='<div class="hdr-r">';
  h+='<button class="hdr-btn" onclick="goPickup()">🛒 Pickup</button>';
  h+='<button class="hdr-bk" onclick="goBack()">'+svg('x')+'</button>';
  h+='</div></div>';

  // Toolbar
  h+='<div class="bom-bar no-print">';
  h+='<button class="bb" onclick="bomExpandAll()">▼ Expand All</button>';
  h+='<button class="bb" onclick="bomCollapseAll()">▶ Collapse All</button>';
  h+='<span style="flex:1"></span>';
  if(S.isAdmin){
    h+='<button class="bb bb-g" onclick="trigCSV()">'+svg('up')+' CSV</button>';
    h+='<button class="bb bb-g" onclick="trigXLSX()">'+svg('up')+' XLSX</button>';
    h+='<button class="bb bb-r" onclick="exportCSV()">'+svg('down')+' Export</button>';
    h+='<button class="bb" onclick="addPartManual()" style="background:rgba(255,255,255,.2)">'+svg('plus')+' Add Part</button>';
  }
  h+='<button class="bb bb-b" onclick="window.print()">'+svg('print')+' Print</button>';
  h+='</div>';

  // BOM Table
  h+='<div class="bom-wrap fade">';
  if(S.bomLoading){h+='<div class="lc"><div class="spin"></div><div style="margin-top:8px;font-size:.82rem">Loading BOM...</div></div>';h+='</div>';return h;}
  if(!sorted.length){h+='<div class="bom-empty">No BOM data yet.'+(S.isAdmin?' Import a CSV to get started.':'')+'<br><button onclick="retryBom()" style="margin-top:12px;padding:8px 20px;border-radius:8px;background:var(--br);color:#fff;font-weight:600;font-size:.82rem;cursor:pointer;border:none">↻ Retry</button></div>';h+='</div>';return h;}

  var num=0;var partIdx=0;
  sorted.forEach(function(b){
    var isGroup=childSet.has(b.id);
    var color=nc[b.id]||DFC;
    if(isGroup){
      var isCol=S.bomCollapsed.has(b.id);
      var desc=getDescendantLeaves(b.id);
      var hidden=isAncCollapsed(b.id);
      var isL1=b.level===1;
      h+='<div class="bom-gh'+(isL1?' bom-gh-l1':'')+(hidden?' hide':'')+'" style="background:'+color.bg+'" data-grp="'+b.id+'">';
      h+='<span class="tri'+(isCol?' col':'')+'">▼</span>';
      if(b.seq)h+='<span class="bom-gh-seq">#'+esc(b.seq)+'</span>';
      h+='<span class="bom-gh-name">'+esc(b.component)+'</span>';
      if(b.part_number)h+='<span class="bom-gh-pn">'+esc(b.part_number)+'</span>';
      h+='<span class="bom-gh-cnt">L'+b.level+' '+desc.length+'</span>';
      h+='</div>';
      partIdx=0;
    }else{
      num++;partIdx++;
      var hidden=isAncCollapsed(b.id);
      var stripe=partIdx%2===0?color.tint:color.light;
      var stCls=b.status==='DONE'?'done':b.status==='IN_PROGRESS'?'wip':b.status==='BLOCKED'?'blocked':'';
      var stLabel=b.status==='DONE'?'Done':b.status==='IN_PROGRESS'?'In Progress':b.status==='BLOCKED'?'Blocked':'Not Started';
      var qHi=b.qty>=4?' bom-rqty-hi':'';
      h+='<div class="bom-r'+(hidden?' hide':'')+'" style="background:'+stripe+';border-left:3px solid '+color.bg+'">';
      h+='<span class="bom-rn">'+num+'</span>';
      if(b.seq)h+='<span class="bom-seq">'+esc(b.seq)+'</span>';
      h+='<div class="bom-rbody"><div class="bom-rpn">'+(b.part_number?esc(b.part_number):'—')+'</div>';
      h+='<div class="bom-rname">'+esc(b.component)+'</div></div>';
      h+='<span class="bom-rfast">';
      if(b.fastener)h+='<span class="bom-pill bom-pill-f">'+esc(b.fastener)+(b.f_qty?' ×'+b.f_qty:'')+'</span>';
      if(b.loctite)h+='<span class="bom-pill bom-pill-l">'+esc(b.loctite)+'</span>';
      if(b.torque)h+='<span class="bom-pill bom-pill-t">'+esc(b.torque)+'</span>';
      if(!b.fastener&&!b.loctite&&!b.torque)h+='<span style="color:#ddd">—</span>';
      h+='</span>';
      h+='<span class="bom-rqty'+qHi+'">'+b.qty+'</span>';
      h+='<span class="bom-rst '+stCls+'">'+stLabel+'</span>';
      h+='</div>';
    }
  });
  h+='</div>';
  return h;
}

function isAncCollapsed(id){var cur=S.bom.find(function(b){return b.id===id;});while(cur&&cur.parent_id){if(S.bomCollapsed.has(cur.parent_id))return true;cur=S.bom.find(function(b){return b.id===cur.parent_id;});}return false;}
function toggleBomGrp(id){if(S.bomCollapsed.has(id))S.bomCollapsed.delete(id);else S.bomCollapsed.add(id);render();}
function bomExpandAll(){S.bomCollapsed.clear();render();}
function bomCollapseAll(){S.bom.forEach(function(b){var isGroup=S.bom.some(function(c){return c.parent_id===b.id;});if(isGroup)S.bomCollapsed.add(b.id);});render();}
function goPickup(){S.subFilter='all';S.filter='all';nav('pickup');}

function vPickup(){
  var u=S.selUnit;if(!u)return '';
  // Build tree structure
  var idMap={};S.bom.forEach(function(b){idMap[b.id]=b;});
  // Get L2 sub-assemblies for chips
  var l2s=S.bom.filter(function(b){return b.level===2;});
  // Get viewable items (L3+ or all children of selected sub)
  var items;
  if(S.subFilter==='all'){items=S.bom;}
  else{items=getDescendants(S.subFilter).concat([idMap[S.subFilter]]);}
  // Filter by status
  var ff=function(b){
    if(S.filter==='pending')return !S.picks[b.id];
    if(S.filter==='picked')return S.picks[b.id]==='picked';
    if(S.filter==='missing')return S.picks[b.id]==='missing';
    return true;
  };
  // Count
  var leafItems=S.bom.filter(function(b){return !S.bom.some(function(c){return c.parent_id===b.id;});});
  var totalPick=leafItems.length;
  var pickedN=leafItems.filter(function(b){return S.picks[b.id]==='picked';}).length;
  var missingN=leafItems.filter(function(b){return S.picks[b.id]==='missing';}).length;
  var pct=totalPick?Math.round((pickedN+missingN)/totalPick*100):0;

  var h='<div class="hdr"><button class="hdr-bk" onclick="goBack()">'+svg('back')+'</button><div class="hdr-b"><div class="hdr-t">🛒 Pickup List</div></div><div class="hdr-r">';
  h+='<span style="font-size:.75rem;font-weight:600">Units:</span><input type="number" value="1" min="1" max="99" id="multIn" style="width:36px;text-align:center;padding:3px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-weight:700;font-size:.8rem">';
  h+='<button class="hdr-btn" onclick="clrP();render()">'+svg('reset')+' Reset</button>';
  h+='<button class="hdr-btn" onclick="window.print()">'+svg('print')+' Print</button>';
  h+='<button class="hdr-bk" onclick="goBack()">'+svg('x')+'</button>';
  h+='</div></div>';

  // Sub-assembly chips
  h+='<div class="pk-bar no-print"><div class="pk-chips">';
  h+='<div class="pk-chip '+(S.subFilter==='all'?'on':'')+'" data-sub="all">All</div>';
  l2s.forEach(function(s){h+='<div class="pk-chip '+(S.subFilter===s.id?'on':'')+'" data-sub="'+s.id+'">'+esc(s.component)+'</div>';});
  h+='</div></div>';

  // Progress
  h+='<div class="pk-prog"><b>'+pickedN+'</b>/'+totalPick+' picked — <b>'+pct+'%</b><div class="bar"><div class="fill" style="width:'+pct+'%"></div></div></div>';

  // Filter buttons with colored dots
  h+='<div class="pk-flt no-print">';
  [{k:'all',l:'All',c:'#333'},{k:'pending',l:'Pending',c:'#ccc'},{k:'picked',l:'Picked',c:'#27ae60'},{k:'missing',l:'Missing',c:'#e74c3c'}].forEach(function(f){
    h+='<div class="pk-fb '+(S.filter===f.k?'on':'')+'" data-flt="'+f.k+'"><span class="pk-fb-dot" style="background:'+(S.filter===f.k?'#fff':f.c)+'"></span>'+f.l+'</div>';
  });
  h+='</div>';

  // Render BOM as grouped list
  h+=renderBomList(items,ff,idMap);

  // Bottom bar
  if(S.isAdmin){
    h+='<div class="bbar no-print">';
    h+='<button class="bbtn bbtn-s" onclick="trigCSV()">'+svg('up')+' Import CSV</button>';
    h+='<button class="bbtn bbtn-s" onclick="exportCSV()">'+svg('down')+' Export CSV</button>';
    h+='</div>';
  }
  return h;
}

function renderBomList(items,ff,idMap){
  var h='';var num=0;
  var sorted=S.bom.slice().sort(function(a,b){return a.sort_order-b.sort_order;});
  // Assign cycling colors to L2 groups (same palette as BOM view)
  var nc={};var ci=0;var childSet=new Set();
  S.bom.forEach(function(b){if(b.parent_id)childSet.add(b.parent_id);});
  sorted.forEach(function(b){
    if(b.level===1&&childSet.has(b.id))nc[b.id]=L1C;
    else if(b.level===2&&childSet.has(b.id)){nc[b.id]=GC[ci%GC.length];ci++;}
  });
  function gClr(id){if(nc[id])return nc[id];var it=S.bom.find(function(x){return x.id===id;});if(it&&it.parent_id){var c=gClr(it.parent_id);nc[id]=c;return c;}return DFC;}
  S.bom.forEach(function(b){gClr(b.id);});

  var partIdx=0;
  sorted.forEach(function(b){
    if(S.subFilter!=='all'){
      var inSub=b.id===S.subFilter||isDescendantOf(b.id,S.subFilter);
      if(!inSub)return;
    }
    var isLeaf=!S.bom.some(function(c){return c.parent_id===b.id;});
    var color=nc[b.id]||DFC;
    // Group headers
    if(b.level<=3&&!isLeaf){
      var desc=getDescendantLeaves(b.id);
      var gPicked=desc.filter(function(d){return S.picks[d.id]==='picked';}).length;
      var gMissing=desc.filter(function(d){return S.picks[d.id]==='missing';}).length;
      var gTotal=desc.length;var gDone=gPicked+gMissing;
      var fillPct=gTotal?Math.round(gDone/gTotal*100):0;
      var fillClr=gDone===gTotal&&gTotal>0?'#27ae60':gMissing>0?'#e74c3c':'#fff';
      h+='<div class="gh" style="background:'+color.light+';border-left:4px solid '+color.bg+'">';
      h+='<div class="gh-left">';
      if(b.seq)h+='<span class="gh-seq">'+esc(b.seq)+'</span>';
      h+='<span class="gh-name">'+esc(b.component)+'</span>';
      h+='<span class="gh-lv">L'+b.level+'</span>';
      h+='</div>';
      h+='<div class="gh-right">';
      h+='<span class="gh-count" style="color:'+color.bg+'">'+gDone+'/'+gTotal+'</span>';
      h+='<div class="gh-minibar"><div class="gh-minifill" style="width:'+fillPct+'%;background:'+color.bg+'"></div></div>';
      h+='</div></div>';
      if(b.level>=2)h+='<div class="gh-sub">'+svg('gear')+' PARTS</div>';
      partIdx=0;
      return;
    }
    if(!isLeaf)return;
    if(!ff(b))return;
    num++;partIdx++;
    var ps=S.picks[b.id]||'';
    var stripe=partIdx%2===0?'#fff':'#fafbfc';
    h+='<div class="pr '+(ps==='picked'?'picked':ps==='missing'?'missing':'')+'" style="background:'+(ps?'':stripe)+'">';
    h+='<span class="pr-num">'+num+'</span>';
    h+='<div class="pr-btns"><button class="pb ck '+(ps==='picked'?'on':'')+'" data-do="pick" data-id="'+b.id+'">'+svg('check')+'</button><button class="pb xx '+(ps==='missing'?'on':'')+'" data-do="miss" data-id="'+b.id+'">'+svg('x')+'</button></div>';
    if(b.seq)h+='<span class="pr-seq">'+esc(b.seq)+'</span>';
    h+='<div class="pr-body"><div class="pr-name'+(ps==='picked'?' pk-done':'')+'">'+esc(b.component)+'</div>';
    if(b.part_number)h+='<div class="pr-pn">'+esc(b.part_number)+'</div>';
    h+='</div>';
    h+='<div class="pr-fast">';
    if(b.fastener)h+='<span class="pill pill-f">'+esc(b.fastener)+(b.f_qty?' ×'+b.f_qty:'')+'</span>';
    if(b.loctite)h+='<span class="pill pill-l">'+esc(b.loctite)+'</span>';
    if(b.torque)h+='<span class="pill pill-t">'+esc(b.torque)+'</span>';
    if(!b.fastener&&!b.loctite&&!b.torque)h+='<span style="color:#ddd">—</span>';
    h+='</div>';
    h+='<span class="pr-qty">'+b.qty+'</span>';
    h+='</div>';
  });
  if(num===0)h+='<div class="lc">No items found</div>';
  return h;
}

function getDescendants(pid){var out=[];S.bom.forEach(function(b){if(isDescendantOf(b.id,pid))out.push(b);});return out;}
function getDescendantLeaves(pid){return getDescendants(pid).filter(function(b){return !S.bom.some(function(c){return c.parent_id===b.id;});});}
function isDescendantOf(id,ancestorId){var cur=S.bom.find(function(b){return b.id===id;});while(cur){if(cur.parent_id===ancestorId)return true;cur=S.bom.find(function(b){return b.id===cur.parent_id;});}return false;}

// Export CSV
function exportCSV(){
  if(!S.bom.length){toast('No BOM data','err');return;}
  var idMap={};S.bom.forEach(function(b){idMap[b.id]=b;});
  var csv='seq,level,component,parent,part_number,qty,status,fastener,f.qty,loctite,torque\n';
  S.bom.slice().sort(function(a,b){return a.sort_order-b.sort_order;}).forEach(function(b){
    var parentName=b.parent_id&&idMap[b.parent_id]?idMap[b.parent_id].component:'';
    csv+=[b.seq||'','L'+b.level,'"'+esc(b.component)+'"','"'+esc(parentName)+'"',b.part_number||'',b.qty,b.status||'NOT_STARTED','"'+(b.fastener||'')+'"',b.f_qty||'',b.loctite||'',b.torque||''].join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(S.selUnit?S.selUnit.name:'BOM')+'_export.csv';a.click();
}

// Bind
function bindAll(){
  document.querySelectorAll('[data-act="unit"]').forEach(function(el){el.onclick=function(){
    var id=el.dataset.id;S.selUnit=S.units.find(function(u){return u.id===id;});S.subFilter='all';S.filter='all';S.bomCollapsed=new Set();S.bomLoading=true;S.bom=[];lodP();nav('bom');loadBom(id);
  };});
  document.querySelectorAll('[data-grp]').forEach(function(el){el.onclick=function(){toggleBomGrp(el.dataset.grp);};});
  document.querySelectorAll('[data-do="pick"]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var id=el.dataset.id;S.picks[id]=S.picks[id]==='picked'?undefined:'picked';if(!S.picks[id])delete S.picks[id];savP();render();};});
  document.querySelectorAll('[data-do="miss"]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var id=el.dataset.id;S.picks[id]=S.picks[id]==='missing'?undefined:'missing';if(!S.picks[id])delete S.picks[id];savP();render();};});
  document.querySelectorAll('[data-sub]').forEach(function(el){el.onclick=function(){S.subFilter=el.dataset.sub==='all'?'all':el.dataset.sub;render();};});
  document.querySelectorAll('[data-flt]').forEach(function(el){el.onclick=function(){S.filter=el.dataset.flt;render();};});
}
</script>
