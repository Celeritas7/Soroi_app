<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563eb;--primary-dark:#1e40af;--primary-light:#60a5fa;--primary-bg:rgba(37,99,235,.1);--primary-bg-hover:rgba(37,99,235,.15);--accent:#2563eb;--accent-hover:#1d4ed8;--badge-admin-bg:#dbeafe;--badge-admin-text:#1e40af;--card-bg:white;--text-primary:#333;--text-secondary:#666;--text-muted:#999;--border-color:#e2e8f0;--input-focus:#2563eb;--success-bg:#f0fdf4;--success-text:#15803d;--error-bg:#fef2f2;--error-text:#b91c1c;--warning-bg:#fffbeb;--warning-text:#d97706}
body.theme-blue{--primary:#2563eb;--primary-dark:#1e40af;--primary-light:#60a5fa;--primary-bg:rgba(37,99,235,.1);--primary-bg-hover:rgba(37,99,235,.15);--accent:#2563eb;--accent-hover:#1d4ed8;--badge-admin-bg:#dbeafe;--badge-admin-text:#1e40af;--input-focus:#2563eb}
body.theme-purple{--primary:#667eea;--primary-dark:#764ba2;--primary-light:#8b9bf4;--primary-bg:rgba(102,126,234,.1);--primary-bg-hover:rgba(102,126,234,.15);--accent:#667eea;--accent-hover:#5a6fd6;--badge-admin-bg:#ede7f6;--badge-admin-text:#5e35b1;--input-focus:#667eea}
body.theme-green{--primary:#059669;--primary-dark:#047857;--primary-light:#34d399;--primary-bg:rgba(5,150,105,.1);--primary-bg-hover:rgba(5,150,105,.15);--accent:#059669;--accent-hover:#047857;--badge-admin-bg:#ecfdf5;--badge-admin-text:#047857;--input-focus:#059669}
body.theme-orange{--primary:#ea580c;--primary-dark:#c2410c;--primary-light:#fb923c;--primary-bg:rgba(234,88,12,.1);--primary-bg-hover:rgba(234,88,12,.15);--accent:#ea580c;--accent-hover:#c2410c;--badge-admin-bg:#fff7ed;--badge-admin-text:#c2410c;--input-focus:#ea580c}
body.theme-dark{--primary:#475569;--primary-dark:#334155;--primary-light:#94a3b8;--primary-bg:rgba(71,85,105,.12);--primary-bg-hover:rgba(71,85,105,.18);--accent:#64748b;--accent-hover:#475569;--badge-admin-bg:#f1f5f9;--badge-admin-text:#334155;--input-focus:#64748b;--card-bg:#fafafa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);min-height:100dvh;padding:20px;transition:background .3s}
.container{max-width:600px;margin:0 auto}
.card{background:var(--card-bg);border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.2);overflow:hidden;padding:24px}
/* Header */
.app-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.app-title h1{font-size:1.3rem;color:var(--text-primary);font-weight:700}.app-title .subtitle{font-size:.78rem;color:var(--text-muted);margin-top:2px}
.header-icons{display:flex;gap:8px;align-items:center}
.header-icon-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border-color);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;text-decoration:none;color:inherit}.header-icon-btn:hover{border-color:var(--primary);background:var(--primary-bg)}
.lang-toggle-btn{padding:4px 10px;border-radius:8px;border:1.5px solid var(--border-color);background:white;font-size:.75rem;font-weight:700;cursor:pointer;color:var(--primary)}.lang-toggle-btn:hover{background:var(--primary-bg)}
.user-info{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px 14px;background:var(--primary-bg);border-radius:10px}
.user-name{font-size:.88rem;font-weight:600;color:var(--text-primary);flex:1}
.user-badge{font-size:.7rem;padding:2px 8px;border-radius:6px;font-weight:600}
.badge-admin{background:var(--badge-admin-bg);color:var(--badge-admin-text)}
/* Loading/Login */
.spinner{width:40px;height:40px;border:3px solid var(--border-color);border-top:3px solid var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-section{text-align:center;padding:40px 20px;color:var(--text-muted)}
#login-section{text-align:center;padding:30px 20px;display:none}
.login-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:16px}.login-btn:hover{background:var(--primary-dark)}
#login-error{color:var(--error-text);margin-top:12px;display:none;font-size:.85rem;white-space:pre-line}
/* Unit grid */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.unit-card{border:2px solid var(--border-color);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .15s;border-top:3px solid var(--primary)}.unit-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.unit-card .ico{font-size:1.8rem;margin-bottom:6px}.unit-card h3{font-size:.9rem;font-weight:700;color:var(--text-primary);margin-bottom:3px}.unit-card p{font-size:.72rem;color:var(--text-muted)}
.unit-empty{text-align:center;padding:30px;color:var(--text-muted)}
/* Pickup */
.pk-back{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1.5px solid var(--border-color);border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;background:white;color:var(--text-secondary);margin-bottom:12px}.pk-back:hover{border-color:var(--primary);color:var(--primary)}
.pk-info{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pk-tag{font-size:.75rem;padding:4px 10px;border-radius:14px;background:var(--primary-bg);color:var(--primary);font-weight:600}
.add-box{background:var(--primary-bg);border:2px solid rgba(37,99,235,.15);border-radius:12px;padding:14px;margin-bottom:14px}
.add-box h3{font-size:.88rem;font-weight:700;color:var(--primary);margin-bottom:8px}
.add-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.add-row input{flex:1;min-width:100px;padding:9px 12px;border:1.5px solid var(--border-color);border-radius:8px;font-size:.88rem}.add-row input:focus{outline:none;border-color:var(--input-focus)}
.add-row input.qty{width:65px;flex:none;text-align:center}
.add-btn{padding:8px 16px;border-radius:8px;border:none;background:var(--primary);color:white;font-size:.85rem;font-weight:600;cursor:pointer}.add-btn:hover{background:var(--primary-dark)}
/* Cart table */
.cart-tbl{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:12px}
.cart-tbl th{text-align:left;padding:6px 8px;background:#f8fafc;border:1px solid var(--border-color);font-weight:700;font-size:.7rem;text-transform:uppercase;color:var(--text-muted)}
.cart-tbl td{padding:6px 8px;border:1px solid var(--border-color)}
.cart-tbl .pn{font-family:monospace;font-weight:600}.cart-tbl .qc{width:45px;text-align:center;font-weight:700}
.cart-tbl .act{width:32px;text-align:center}
.cart-tbl .dbtn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.95rem}.cart-tbl .dbtn:hover{color:var(--error-text)}
.submit-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s;margin-bottom:8px}.submit-btn:hover{filter:brightness(1.1)}.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.clear-btn{display:block;width:100%;padding:10px;background:var(--error-bg);color:var(--error-text);border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;margin-bottom:8px}
/* Status */
.status{padding:10px 14px;border-radius:8px;margin-top:8px;text-align:center;font-size:.88rem;font-weight:500;display:none}
.status.loading{display:block;background:var(--primary-bg);color:var(--primary)}.status.success{display:block;background:var(--success-bg);color:var(--success-text)}.status.error{display:block;background:var(--error-bg);color:var(--error-text)}
/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}.modal-overlay.active{display:flex}
.modal{background:white;border-radius:16px;padding:24px;width:100%;max-width:450px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:12px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-close-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-muted);padding:4px 8px}.modal-close-btn:hover{color:var(--text-primary)}
.modal-btn{padding:10px 20px;border-radius:8px;border:none;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s}
.modal-btn.confirm{background:var(--primary);color:white}.modal-btn.cancel{background:#f1f5f9;color:var(--text-secondary)}
/* Settings */
.settings-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f1f5f9}
.settings-section:last-child{border-bottom:none}
.settings-section h3{font-size:.9rem;font-weight:700;color:var(--text-primary);margin-bottom:10px}
/* Sheet options */
.sheet-options{display:flex;flex-direction:column;gap:8px}
.sheet-option{cursor:pointer;display:block}.sheet-option input{display:none}
.sheet-option-content{display:flex;align-items:center;gap:12px;padding:12px;border:2px solid var(--border-color);border-radius:10px;transition:all .15s}
.sheet-option input:checked+.sheet-option-content{border-color:var(--primary);background:var(--primary-bg)}
.sheet-option-icon{font-size:1.5rem}.sheet-option-text{display:flex;flex-direction:column}.sheet-option-text strong{font-size:.88rem}.sheet-option-text small{font-size:.72rem;color:var(--text-muted)}
/* Theme */
.theme-options{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.theme-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px;border:2px solid var(--border-color);border-radius:12px;background:white;cursor:pointer;transition:all .2s}.theme-btn:hover{border-color:#999}.theme-btn.active{border-color:var(--primary);background:var(--primary-bg)}
.theme-preview{width:40px;height:40px;border-radius:50%}
.theme-preview.blue{background:linear-gradient(135deg,#2563eb,#1e40af)}.theme-preview.purple{background:linear-gradient(135deg,#667eea,#764ba2)}.theme-preview.green{background:linear-gradient(135deg,#059669,#047857)}.theme-preview.orange{background:linear-gradient(135deg,#ea580c,#c2410c)}.theme-preview.dark{background:linear-gradient(135deg,#475569,#334155)}
.theme-btn span:last-child{font-size:.8rem;color:var(--text-secondary)}
@media(max-width:500px){body{padding:10px}.card{padding:16px;border-radius:12px}.unit-grid{grid-template-columns:1fr 1fr}.add-row{flex-direction:column}.add-row input.qty{width:100%}.theme-options{grid-template-columns:repeat(5,1fr)}.theme-btn{padding:8px}}
</style>
</head>

        }
    });
    setTimeout(()=>{if(!authReady)showLogin();},4000);
    initGIS();
};

async function handleGoogleLogin(){
    try{const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+window.location.pathname}});
    if(error)showLoginError('Login failed: '+error.message);}catch(e){showLoginError('Login failed: '+e.message);}
}

async function checkUserApproval(user){
    try{
        const{data,error}=await sb.from('authentication_mode_user_roles').select('name,role').eq('email',user.email);
        if(error||!data||!data.length){
            // Fallback for known admins
            if(user.email==='mangaonkaraniket@gmail.com'||user.email==='anikettelexistence@gmail.com'){
                userProfile={email:user.email,name:user.user_metadata?.full_name||user.email,role:'admin',isAdmin:true};
            }else{
                await sb.auth.signOut();showLoginError('Access denied.\n'+user.email+' is not authorized.');showLogin();return;
            }
        }else{
            userProfile={email:user.email,name:data[0].name||user.email,role:data[0].role,isAdmin:data[0].role==='admin'};
        }
        await loadUnits();
        showApp();
    }catch(e){console.error('Auth check:',e);showLoginError('Error checking access');showLogin();}
}

async function handleLogout(){
    await sb.auth.signOut();
    localStorage.removeItem('gis_sheets_token');
    accessToken=null;userProfile=null;cart=[];currentSheet='production';
    closeSettingsModal();
}

function showLoginError(msg){const el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}

// =====================================================
// GIS (same as Part Inventory — silent re-auth)
// =====================================================
function initGIS(){
    if(typeof google==='undefined'||!google.accounts){setTimeout(initGIS,300);return;}
    gisTokenClient=google.accounts.oauth2.initTokenClient({client_id:GIS_CLIENT_ID,scope:GIS_SCOPES,
        callback:r=>{if(r.access_token){accessToken=r.access_token;localStorage.setItem('gis_sheets_token',accessToken);console.log('GIS: token obtained');}}
    });
    console.log('GIS: initialized');
}
function gisReAuth(){
    return new Promise((resolve,reject)=>{
        if(!gisTokenClient){reject(new Error('GIS not ready'));return;}
        let done=false;const origCb=gisTokenClient.callback;
        gisTokenClient.callback=r=>{if(done)return;done=true;gisTokenClient.callback=origCb;if(r.access_token){accessToken=r.access_token;localStorage.setItem('gis_sheets_token',accessToken);resolve();}else reject(new Error('Token failed'));};
        gisTokenClient.requestAccessToken({prompt:''});
        setTimeout(()=>{if(!done){done=true;gisTokenClient.callback=origCb;reject(new Error('Re-auth timeout'));}},15000);
    });
}
function gisRequestToken(){if(!gisTokenClient){alert('Google auth loading. Try again.');return;}gisTokenClient.requestAccessToken();}

// =====================================================
// SHEETS API (same as Part Inventory)
// =====================================================
async function sheetsApiRequest(url,options={},isRetry=false){
    if(!accessToken)accessToken=localStorage.getItem('gis_sheets_token');
    if(!accessToken)throw new Error('NEEDS_GIS_AUTH');
    const resp=await fetch(url,{...options,headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json',...(options.headers||{})}});
    if(resp.status===401&&!isRetry){try{await gisReAuth();return sheetsApiRequest(url,options,true);}catch(e){accessToken=null;localStorage.removeItem('gis_sheets_token');throw new Error('NEEDS_GIS_AUTH');}}
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API error '+resp.status);}
    return resp.json();
}
function getCurrentSpreadsheetId(){return SHEETS_CONFIG[currentSheet].id;}
async function checkSheetExists(name,sid){const d=await sheetsApiRequest('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'?fields=sheets.properties.title');return(d.sheets||[]).some(s=>s.properties.title===name);}
async function createNewSheet(name,sid){
    await sheetsApiRequest('https://sheets.googleapis.com/v4/spreadsheets/'+sid+':batchUpdate',{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:name}}}]})});
    await sheetsApiRequest('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+encodeURIComponent(name)+'!A1:F1?valueInputOption=RAW',{method:'PUT',body:JSON.stringify({values:[['Date','Time','Operator','Part Number','Description','Qty']]})});
}
async function getNextRowNumber(name,sid){const d=await sheetsApiRequest('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+encodeURIComponent(name)+'!A:A');return(d.values||[]).length+1;}
async function writeRows(name,startRow,rows,sid){await sheetsApiRequest('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+encodeURIComponent(name)+'!A'+startRow+':F'+(startRow+rows.length-1)+'?valueInputOption=USER_ENTERED',{method:'PUT',body:JSON.stringify({values:rows})});}

// =====================================================
// UI STATES
// =====================================================
function showLoading(){document.getElementById('loading-section').style.display='block';document.getElementById('login-section').style.display='none';document.getElementById('app-section').style.display='none';}
function showLogin(){document.getElementById('loading-section').style.display='none';document.getElementById('login-section').style.display='block';document.getElementById('app-section').style.display='none';applyLang();}
function showApp(){
    document.getElementById('loading-section').style.display='none';document.getElementById('login-section').style.display='none';document.getElementById('app-section').style.display='block';
    document.getElementById('header-icons').style.display='flex';
    document.getElementById('sheet-selector-btn').style.display=userProfile.isAdmin?'flex':'none';
    document.getElementById('admin-link').style.display=userProfile.isAdmin?'flex':'none';

}

// =====================================================
// DATA
// =====================================================
async function loadUnits(){
    try{const{data,error}=await sb.from('soroi_app_units').select('*').order('sort_order');
    if(error){console.error('loadUnits:',error);units=[];}else{units=data||[];}
    console.log('Units:',units.length);}catch(e){console.error('loadUnits:',e);units=[];}
}

// =====================================================
// NAVIGATION
// =====================================================
function navHome(){currentView='home';selUnit=null;cart=[];document.getElementById('v-home').style.display='block';document.getElementById('v-pickup').style.display='none';renderHome();}
function navPickup(){currentView='pickup';document.getElementById('v-home').style.display='none';document.getElementById('v-pickup').style.display='block';renderPickup();}

// =====================================================
// HOME VIEW
// =====================================================
function renderHome(){
    let h='<div class="pk-info"><span class="pk-tag">'+t('selectUnit')+'</span></div>';
    h+='<div class="unit-grid">';
    units.forEach(u=>{const c=u.color||'var(--primary)';h+='<div class="unit-card" onclick="openUnit(\''+u.id+'\')" style="border-top-color:'+c+'"><div class="ico">'+esc(u.icon||'📦')+'</div><h3>'+esc(u.name)+'</h3><p>'+t('tapStart')+'</p></div>';});
    if(!units.length)h+='<div class="unit-empty"><p>'+t('noUnits')+'</p></div>';
    h+='</div>';
    document.getElementById('v-home').innerHTML=h;
}

function openUnit(id){selUnit=units.find(u=>u.id===id);if(!selUnit)return;cart=[];navPickup();}

// =====================================================
// PICKUP VIEW
// =====================================================
function renderPickup(){
    if(!selUnit)return;
    const d=new Date();const dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const timeStr=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    let h='<button class="pk-back" onclick="navHome()">'+t('back')+'</button>';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:1.5rem">'+(selUnit.icon||'📦')+'</span><div><h2 style="font-size:1.1rem;font-weight:700">'+esc(selUnit.name)+'</h2><p style="font-size:.75rem;color:var(--text-muted)">'+dateStr+' · '+(userProfile?esc(userProfile.name):'')+'</p></div></div>';
    // Add part
    h+='<div class="add-box"><h3>'+t('addPart')+'</h3><div class="add-row"><input id="inp-pn" placeholder="'+t('pnPh')+'" style="font-family:monospace"><input id="inp-name" placeholder="'+t('namePh')+'"><input id="inp-qty" class="qty" type="number" value="1" min="1" placeholder="'+t('qtyPh')+'"></div><button class="add-btn" onclick="addToCart()">'+t('add')+'</button></div>';
    // Cart
    if(cart.length){
        h+='<h3 style="font-size:.9rem;font-weight:700;margin-bottom:8px">'+t('cart')+' ('+cart.length+')</h3>';
        h+='<table class="cart-tbl"><thead><tr><th>#</th><th>'+t('pnPh')+'</th><th>'+t('namePh')+'</th><th>'+t('qtyPh')+'</th><th class="act"></th></tr></thead><tbody>';
        cart.forEach((c,i)=>{h+='<tr><td>'+(i+1)+'</td><td class="pn">'+esc(c.pn)+'</td><td>'+esc(c.name)+'</td><td class="qc">'+c.qty+'</td><td class="act"><button class="dbtn" onclick="cart.splice('+i+',1);renderPickup()">✕</button></td></tr>';});
        h+='</tbody></table>';
        h+='<button class="submit-btn" onclick="submitToSheet()">'+t('submit')+' ('+cart.length+')</button>';
        h+='<button class="clear-btn" onclick="cart=[];renderPickup()">'+t('clear')+'</button>';
    }else{
        h+='<div class="unit-empty"><p>'+t('empty')+'</p></div>';
    }
    h+='<div class="status" id="pk-status"></div>';
    document.getElementById('v-pickup').innerHTML=h;
    setTimeout(()=>{const inp=document.getElementById('inp-pn');if(inp)inp.focus();},50);
}

function addToCart(){
    const pn=(document.getElementById('inp-pn').value||'').trim();
    const name=(document.getElementById('inp-name').value||'').trim();
    const qty=parseInt(document.getElementById('inp-qty').value)||1;
    if(!pn&&!name)return;
    cart.push({pn:pn,name:name||pn,qty:qty});
    renderPickup();
}

// =====================================================
// SUBMIT
// =====================================================
async function submitToSheet(){
    if(!cart.length)return;
    showStatus('pk-status',t('submitting')||'Submitting...','loading');
    try{
        const tab=selUnit?selUnit.name:'Pickup';
        const sid=getCurrentSpreadsheetId();
        if(!(await checkSheetExists(tab,sid)))await createNewSheet(tab,sid);
        const row=await getNextRowNumber(tab,sid);
        const d=new Date();const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        const ts=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
        const rows=cart.map(c=>[ds,ts,userProfile?userProfile.name:'',c.pn,c.name,String(c.qty)]);
        await writeRows(tab,row,rows,sid);
        showStatus('pk-status','✅ '+cart.length+' '+t('submitOk'),'success');
        cart=[];setTimeout(()=>{renderPickup();},2000);
    }catch(e){
        console.error(e);
        if(e.message==='NEEDS_GIS_AUTH'){
            showStatus('pk-status','📋 Sheets auth needed','error');
            const el=document.getElementById('pk-status');
            if(el)el.innerHTML+='<br><button onclick="gisRequestToken()" style="margin-top:8px;padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">🔑 Connect Google Sheets</button>';
        }else{showStatus('pk-status','Error: '+e.message,'error');}
    }
}

function closeSettingsModal(){document.getElementById('settings-modal').classList.remove('active');}

// =====================================================
// THEME (same as Part Inventory)
// =====================================================
function setTheme(theme){document.body.classList.remove('theme-blue','theme-purple','theme-green','theme-orange','theme-dark');document.body.classList.add('theme-'+theme);localStorage.setItem('soroi-theme',theme);updateThemeButtons();}

function updateThemeButtons(){const t=localStorage.getItem('soroi-theme')||'blue';document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));}

// =====================================================
// LANGUAGE
// =====================================================
function toggleLang(){currentLang=currentLang==='en'?'ja':'en';localStorage.setItem('soroi-lang',currentLang);applyLang();}
function setLang(lang){currentLang=lang;localStorage.setItem('soroi-lang',lang);applyLang();updateLangButtons();}
function updateLangButtons(){
    const enB=document.getElementById('lang-btn-en'),jaB=document.getElementById('lang-btn-ja');
    if(enB){enB.style.background=currentLang==='en'?'var(--primary)':'#fff';enB.style.color=currentLang==='en'?'#fff':'var(--text-secondary)';}
    if(jaB){jaB.style.background=currentLang==='ja'?'var(--primary)':'#fff';jaB.style.color=currentLang==='ja'?'#fff':'var(--text-secondary)';}
}
function applyLang(){
    document.getElementById('lang-toggle').textContent=currentLang==='en'?'日本語':'EN';
    document.getElementById('app-title').textContent=t('title');
    document.getElementById('app-subtitle').textContent=t('sub');
    document.getElementById('login-prompt').textContent=t('loginPrompt');
    document.getElementById('login-btn-text').textContent=t('loginBtn');
    if(currentView==='home')renderHome();
    if(currentView==='pickup')renderPickup();
}

// =====================================================
// HELPERS
// =====================================================
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showStatus(id,msg,type){const s=document.getElementById(id);if(!s)return;s.textContent=msg;s.className='status '+type;}
</script>
