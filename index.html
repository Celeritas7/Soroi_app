<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f0ec;--sf:#fff;--tx:#2c1810;--t2:#6b5a4e;--t3:#a39485;--t4:#c8beb4;--bd:#e0d6cc;--bl:#ede8e2;--br:#c8553d;--br2:#a8432f;--grn:#27ae60;--grn-bg:#eafaf1;--ylw:#f39c12;--ylw-bg:#fef9e7;--red:#e74c3c;--red-bg:#fdedec;--pur:#8e44ad;--blu:#2980b9;--ft:'Outfit',system-ui,sans-serif;--mn:'IBM Plex Mono',monospace;--r:10px;--rs:6px;--sh:0 1px 3px rgba(0,0,0,.06);--sb:env(safe-area-inset-bottom,0px)}
html{font-family:var(--ft);font-size:14px;color:var(--tx);background:var(--bg)}
body{min-height:100dvh}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
#app{display:flex;flex-direction:column;min-height:100dvh}

/* Header */
.hdr{background:var(--br);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(200,85,61,.3)}
.hdr-bk{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);flex-shrink:0}.hdr-bk:hover{background:rgba(255,255,255,.15)}
.hdr svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.hdr-b{flex:1;min-width:0}.hdr-t{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hdr-s{font-size:.7rem;opacity:.7}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-btn{padding:5px 10px;border-radius:var(--rs);font-size:.75rem;font-weight:600;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;gap:4px}
.hdr-btn:hover{background:rgba(255,255,255,.25)}
.cnt{flex:1;padding:0 0 calc(16px + var(--sb))}

/* Login */
.lgn{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px 24px;text-align:center;background:linear-gradient(170deg,var(--bg),#e8ddd2)}
.lgn-ic{width:80px;height:80px;border-radius:20px;margin-bottom:20px;background:var(--br);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 32px rgba(200,85,61,.3)}
.lgn-ic svg{width:38px;height:38px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.lgn-h{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}.lgn-h span{color:var(--br)}
.lgn-p{font-size:.85rem;color:var(--t3);margin-bottom:24px}
.lgn-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:var(--tx);font-weight:600;font-size:.9rem;padding:12px 28px;border-radius:var(--r);box-shadow:var(--sh);border:1.5px solid var(--bd)}

/* Unit cards */
.ugrid{padding:16px;display:flex;flex-direction:column;gap:8px}
.ucard{background:var(--sf);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);border:1.5px solid var(--bl);display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .1s}
.ucard:active{transform:scale(.985)}
.ucard-ico{width:40px;height:40px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.ucard-b{flex:1;min-width:0}.ucard-n{font-weight:600;font-size:.92rem}.ucard-d{font-size:.75rem;color:var(--t3)}
.ucard-a{color:var(--t4)}.ucard-a svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* Admin bar */
.abar{padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap}
.abtn{padding:6px 12px;border-radius:var(--rs);font-size:.75rem;font-weight:600;background:var(--sf);border:1.5px solid var(--bd);display:flex;align-items:center;gap:4px}
.abtn:hover{background:var(--bl)}.abtn.dng{color:var(--red);border-color:var(--red)}

/* Pickup List — Axon style */
.pk-bar{padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bl)}
.pk-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.pk-chips::-webkit-scrollbar{display:none}
.pk-chip{padding:5px 12px;border-radius:16px;font-size:.75rem;font-weight:600;white-space:nowrap;border:1.5px solid var(--bd);background:var(--sf);color:var(--t2);flex-shrink:0;cursor:pointer}
.pk-chip.on{background:var(--br);color:#fff;border-color:var(--br)}
.pk-prog{padding:8px 16px;font-size:.8rem;color:var(--t2);font-weight:500}
.pk-prog b{color:var(--tx)}
.pk-prog .bar{height:4px;background:var(--bl);border-radius:2px;margin-top:4px;overflow:hidden}
.pk-prog .fill{height:100%;background:var(--grn);border-radius:2px;transition:width .3s}
.pk-flt{display:flex;gap:4px;padding:6px 16px;font-size:.75rem}
.pk-fb{padding:4px 10px;border:1.5px solid var(--bd);border-radius:4px;font-weight:600;background:var(--sf);cursor:pointer}
.pk-fb.on{background:var(--tx);color:#fff;border-color:var(--tx)}

/* Group header — colored bars */
.gh{padding:6px 14px;display:flex;align-items:center;gap:8px;margin-top:8px;font-weight:700;font-size:.82rem;color:#fff}
.gh-seq{background:rgba(0,0,0,.2);padding:1px 8px;border-radius:10px;font-family:var(--mn);font-size:.72rem}
.gh-name{flex:1}.gh-lv{font-size:.7rem;opacity:.7;font-weight:500}
.gh-prog{font-size:.75rem;font-weight:500;display:flex;align-items:center;gap:4px}
.gh-prog .minibar{width:40px;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.gh-prog .minifill{height:100%;background:#fff;border-radius:2px}
/* L2=pink/red, L3=green, L4=blue-ish */
.gh-l2{background:#e74c3c}.gh-l3{background:#27ae60}.gh-l4{background:#2980b9}.gh-l5{background:#8e44ad}
.gh-sub{padding:4px 14px;font-size:.7rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:4px}
.gh-sub svg{width:12px;height:12px;stroke:var(--t3);fill:none;stroke-width:2}

/* Part row */
.pr{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--sf);border-bottom:1px solid var(--bl);font-size:.85rem;transition:background .15s}
.pr.picked{background:var(--grn-bg)}.pr.missing{background:var(--red-bg)}.pr.fo{display:none}
.pr-num{width:22px;text-align:center;font-size:.75rem;color:var(--t3);font-weight:600;flex-shrink:0}
.pr-btns{display:flex;gap:3px;flex-shrink:0}
.pb{width:28px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bd);font-size:.8rem;transition:all .1s}
.pb svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.pb.ck{color:var(--grn)}.pb.ck.on,.pb.ck:hover{background:var(--grn);color:#fff;border-color:var(--grn)}
.pb.xx{color:var(--red)}.pb.xx.on,.pb.xx:hover{background:var(--red);color:#fff;border-color:var(--red)}
.pr-seq{background:var(--red);color:#fff;font-family:var(--mn);font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:8px;flex-shrink:0;min-width:20px;text-align:center}
.pr-body{flex:1;min-width:0}.pr-name{font-weight:600;font-size:.85rem}.pr-pn{font-size:.7rem;color:var(--t3);font-family:var(--mn)}
.pr-fast{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.pr-fast .pill{font-size:.62rem;font-weight:600;padding:0px 5px;border-radius:4px}
.pill-f{background:#ede9fe;color:#6d28d9}.pill-l{background:#fef3c7;color:#b45309}.pill-t{background:#dbeafe;color:#1d4ed8}.pill-q{background:#fce4ec;color:#c62828}
.pr-qty{font-weight:800;font-size:.95rem;min-width:28px;text-align:center;flex-shrink:0}

/* Bottom bar */
.bbar{position:sticky;bottom:0;background:var(--sf);border-top:1.5px solid var(--bd);padding:10px 16px calc(10px + var(--sb));display:flex;gap:8px;z-index:50;box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.bbtn{flex:1;padding:11px;border-radius:var(--r);font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;gap:6px}
.bbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bbtn-p{background:var(--grn);color:#fff}.bbtn-s{background:var(--bl);border:1.5px solid var(--bd);color:var(--t2)}
.bbtn-d{background:var(--red);color:#fff}

/* Toast & Modal */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-80px);padding:8px 18px;border-radius:var(--r);font-size:.82rem;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:1000;max-width:90vw;text-align:center;transition:transform .3s;background:var(--tx);color:#fff}.toast.show{transform:translateX(-50%) translateY(0)}.toast.err{background:var(--red)}.toast.ok{background:var(--grn)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}.mo.show{opacity:1;pointer-events:auto}
.mo .md{background:var(--sf);border-radius:12px 12px 0 0;padding:20px 16px calc(20px + var(--sb));width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s}.mo.show .md{transform:translateY(0)}
.md-t{font-weight:700;font-size:1rem;margin-bottom:6px}.md-p{font-size:.85rem;color:var(--t2);margin-bottom:14px;line-height:1.5}
.md-a{display:flex;gap:8px}.md-a button{flex:1;padding:10px;border-radius:var(--r);font-weight:600;font-size:.85rem}
.mdc{background:var(--bl);border:1.5px solid var(--bd)}.mdo{background:var(--grn);color:#fff}.mdd{background:var(--red);color:#fff}
.md-input{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--rs);margin-bottom:10px;font-size:.9rem}
.spin{width:20px;height:20px;border:2.5px solid var(--bd);border-top-color:var(--br);border-radius:50%;animation:sp .6s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.lc{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px;color:var(--t3)}
.fade{animation:fi .15s ease}@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@media print{.hdr,.bbar,.pk-bar,.pk-flt,.abar,.no-print{display:none!important}.pr-btns{display:none!important}.cnt{padding:0}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div id="modal" class="mo"><div class="md"><div class="md-t" id="mt"></div><div class="md-p" id="mp"></div><div id="mc"></div><div class="md-a" id="ma"></div></div></div>
<input type="file" id="csvF" accept=".csv" style="display:none">
<script>
const SB_URL='https://wylxvmkcrexwfpjpbhyy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak';
const GIS_CID='1088099187141-ut0dn0scqt3h99htf3rg8gsrg2oo1ad8.apps.googleusercontent.com';
const sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'sb-soroi2-auth'}});

let S={user:null,isAdmin:false,view:'loading',units:[],selUnit:null,bom:[],picks:{},filter:'all',subFilter:'all',sheetId:localStorage.getItem('soroi_sid')||'',authOk:false};
let gisC=null,sTk=localStorage.getItem('soroi_stk')||null;

// SVG
const IC={back:'<polyline points="15 18 9 12 15 6"/>',check:'<polyline points="20 6 9 17 4 12"/>',x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',chev:'<polyline points="9 18 15 12 9 6"/>',cart:'<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>',send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',print:'<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>',up:'<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',down:'<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',reset:'<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>',gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68 1.65 1.65 0 0010 3.17V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>',trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>'};
function svg(n){return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'+(IC[n]||'')+'</svg>';}
var GL='<svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';

function $(id){return document.getElementById(id);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,t){var e=$('toast');e.textContent=m;e.className='toast show '+(t||'');clearTimeout(toast._t);toast._t=setTimeout(function(){e.className='toast';},2500);}
function modal(t,p,extra,acts){$('mt').textContent=t;$('mp').textContent=p;$('mc').innerHTML=extra||'';var el=$('ma');el.innerHTML='';acts.forEach(function(a){var b=document.createElement('button');b.textContent=a.label;b.className=a.cls||'mdc';b.onclick=function(){$('modal').classList.remove('show');if(a.fn)a.fn();};el.appendChild(b);});$('modal').classList.add('show');}

// Auth
window.onload=function(){sb.auth.onAuthStateChange(async function(ev,sess){if(sess&&sess.user&&['SIGNED_IN','TOKEN_REFRESHED','INITIAL_SESSION'].indexOf(ev)>=0){await ckRole(sess.user);S.authOk=true;}else if(ev==='SIGNED_OUT'||(ev==='INITIAL_SESSION'&&!sess)){S.user=null;S.authOk=true;nav('login');}});setTimeout(function(){if(!S.authOk)nav('login');},4000);initGIS();};
async function doLogin(){var r=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}});if(r.error)toast('Login failed','err');}
async function doLogout(){await sb.auth.signOut();S.user=null;nav('login');}
async function ckRole(u){try{var r=await sb.from('authentication_mode_user_roles').select('name,role').eq('email',u.email).single();if(r.data){S.user={email:u.email,name:r.data.name||u.email};S.isAdmin=r.data.role==='admin';}else{S.user={email:u.email,name:(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0]};S.isAdmin=false;}}catch(e){S.user={email:u.email,name:(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0]};S.isAdmin=false;}nav('home');loadUnits();}

// GIS
function initGIS(){if(typeof google==='undefined'||!google||!google.accounts){setTimeout(initGIS,300);return;}gisC=google.accounts.oauth2.initTokenClient({client_id:GIS_CID,scope:'https://www.googleapis.com/auth/spreadsheets',callback:function(r){if(r.access_token){sTk=r.access_token;localStorage.setItem('soroi_stk',sTk);}}});}

// Data
async function loadUnits(){try{var r=await sb.from('soroi_app_units').select('*').order('sort_order');S.units=r.data||[];}catch(e){console.error(e);}render();}
async function loadBom(uid){try{var r=await sb.from('soroi_app_bom').select('*').eq('unit_id',uid).order('sort_order');S.bom=r.data||[];}catch(e){toast('Load failed','err');}render();}

// CSV Import
function trigCSV(){$('csvF').click();}
document.addEventListener('DOMContentLoaded',function(){$('csvF').addEventListener('change',function(e){var f=e.target.files[0];if(!f||!S.selUnit)return;var reader=new FileReader();reader.onload=function(ev){parseAndImport(ev.target.result);};reader.readAsText(f);e.target.value='';});});

async function parseAndImport(text){
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2){toast('Empty CSV','err');return;}
  // Parse header
  var hdr=lines[0].split(',').map(function(h){return h.trim().toLowerCase();});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCSVLine(lines[i]);
    var obj={};hdr.forEach(function(h,j){obj[h]=cols[j]||'';});
    rows.push(obj);
  }
  // Delete existing BOM for this unit
  toast('Importing...','');
  try{await sb.from('soroi_app_bom').delete().eq('unit_id',S.selUnit.id);}catch(e){}
  // Insert rows with hierarchy
  var nameToId={};var sortIdx=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var parentId=null;
    var parentName=(r.parent||'').trim();
    if(parentName&&nameToId[parentName])parentId=nameToId[parentName];
    var lv=parseInt((r.level||'').replace(/[^0-9]/g,''))||1;
    var ins={unit_id:S.selUnit.id,parent_id:parentId,seq:(r.seq||'').trim()||null,level:lv,component:(r.component||'').trim(),part_number:(r.part_number||'').trim()||null,qty:parseInt(r.qty)||1,status:(r.status||'NOT_STARTED').trim(),fastener:(r.fastener||'').trim()||null,f_qty:parseInt(r['f.qty']||r.f_qty)||null,loctite:(r.loctite||'').trim()||null,torque:(r.torque||'').trim()||null,sort_order:sortIdx++};
    try{
      var res=await sb.from('soroi_app_bom').insert(ins).select().single();
      if(res.data)nameToId[ins.component]=res.data.id;
    }catch(e){console.error('Row '+i+':',e);}
  }
  toast('Imported '+rows.length+' items!','ok');
  loadBom(S.selUnit.id);
}

function parseCSVLine(line){
  var result=[],cell='',inQuotes=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQuotes){if(c==='"'&&line[i+1]==='"'){cell+='"';i++;}else if(c==='"'){inQuotes=false;}else{cell+=c;}}
    else{if(c==='"'){inQuotes=true;}else if(c===','){result.push(cell.trim());cell='';}else{cell+=c;}}
  }
  result.push(cell.trim());return result;
}

// Pick state
function psk(){return 'soroi_pk_'+(S.selUnit?S.selUnit.id:'x');}
function savP(){localStorage.setItem(psk(),JSON.stringify(S.picks));}
function lodP(){try{S.picks=JSON.parse(localStorage.getItem(psk()))||{};}catch(e){S.picks={};}}
function clrP(){S.picks={};localStorage.removeItem(psk());}

// Unit CRUD
async function addUnit(){modal('New Unit','','<input class="md-input" id="nu-name" placeholder="Unit name (e.g. Compressor)"><input class="md-input" id="nu-icon" placeholder="Emoji icon" value="📦">',[{label:'Cancel',cls:'mdc'},{label:'Create',cls:'mdo',fn:async function(){var n=$('nu-name').value.trim(),ic=$('nu-icon').value.trim()||'📦';if(!n)return;try{await sb.from('soroi_app_units').insert({name:n,icon:ic,sort_order:S.units.length});toast('Created!','ok');loadUnits();}catch(e){toast(e.message,'err');}}}]);}
async function delUnit(id){modal('Delete Unit','Delete this unit and all its BOM data?','',[{label:'Cancel',cls:'mdc'},{label:'Delete',cls:'mdd',fn:async function(){try{await sb.from('soroi_app_bom').delete().eq('unit_id',id);await sb.from('soroi_app_units').delete().eq('id',id);toast('Deleted','ok');loadUnits();}catch(e){toast(e.message,'err');}}}]);}

// Nav
function nav(v){S.view=v;render();}
function goBack(){if(S.view==='pickup'){S.selUnit=null;S.bom=[];S.picks={};S.filter='all';S.subFilter='all';nav('home');}else nav('home');}

// Render
function render(){var a=$('app');switch(S.view){case'loading':a.innerHTML='<div class="lc" style="min-height:100dvh;justify-content:center"><div class="spin"></div></div>';break;case'login':a.innerHTML=vLogin();break;case'home':a.innerHTML=vHome();break;case'pickup':a.innerHTML=vPickup();break;}bindAll();}

function vLogin(){return '<div class="lgn"><div class="lgn-ic">'+svg('cart')+'</div><div class="lgn-h"><span>揃い</span> Soroi</div><div class="lgn-p">Shop Floor Pickup</div><button class="lgn-btn" onclick="doLogin()">'+GL+' Sign in with Google</button></div>';}

function vHome(){
  var h='<div class="hdr"><div class="hdr-b"><div class="hdr-t">🛒 揃い Soroi</div><div class="hdr-s">Shop Floor Pickup</div></div><div class="hdr-r">';
  if(S.user)h+='<span style="font-size:.72rem;opacity:.7">'+esc(S.user.name.split(' ')[0])+'</span><button class="hdr-btn" onclick="doLogout()">Out</button>';
  h+='</div></div>';
  if(S.isAdmin)h+='<div class="abar no-print"><button class="abtn" onclick="addUnit()">'+svg('plus')+' New Unit</button></div>';
  h+='<div class="ugrid fade">';
  if(!S.units.length)h+='<div class="lc">No units yet.'+(S.isAdmin?' Create one above.':'')+'</div>';
  S.units.forEach(function(u){
    h+='<div class="ucard" data-act="unit" data-id="'+u.id+'"><div class="ucard-ico" style="background:'+u.color+'15">'+esc(u.icon||'📦')+'</div><div class="ucard-b"><div class="ucard-n">'+esc(u.name)+'</div><div class="ucard-d">'+esc(u.description||'')+'</div></div>';
    if(S.isAdmin)h+='<button style="padding:4px;color:var(--red);flex-shrink:0" onclick="event.stopPropagation();delUnit(\''+u.id+'\')">'+svg('trash')+'</button>';
    h+='<div class="ucard-a">'+svg('chev')+'</div></div>';
  });
  h+='</div>';
  if(S.isAdmin){h+='<div class="abar"><div style="font-size:.72rem;color:var(--t3)">Sheet ID:</div><input style="flex:1;padding:6px 8px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.75rem" value="'+esc(S.sheetId)+'" onchange="S.sheetId=this.value;localStorage.setItem(\'soroi_sid\',this.value)"></div>';}
  return h;
}

function vPickup(){
  var u=S.selUnit;if(!u)return '';
  // Build tree structure
  var idMap={};S.bom.forEach(function(b){idMap[b.id]=b;});
  // Get L2 sub-assemblies for chips
  var l2s=S.bom.filter(function(b){return b.level===2;});
  // Get viewable items (L3+ or all children of selected sub)
  var items;
  if(S.subFilter==='all'){items=S.bom;}
  else{items=getDescendants(S.subFilter).concat([idMap[S.subFilter]]);}
  // Filter by status
  var ff=function(b){
    if(S.filter==='pending')return !S.picks[b.id];
    if(S.filter==='picked')return S.picks[b.id]==='picked';
    if(S.filter==='missing')return S.picks[b.id]==='missing';
    return true;
  };
  // Count
  var leafItems=S.bom.filter(function(b){return !S.bom.some(function(c){return c.parent_id===b.id;});});
  var totalPick=leafItems.length;
  var pickedN=leafItems.filter(function(b){return S.picks[b.id]==='picked';}).length;
  var missingN=leafItems.filter(function(b){return S.picks[b.id]==='missing';}).length;
  var pct=totalPick?Math.round((pickedN+missingN)/totalPick*100):0;

  var h='<div class="hdr"><button class="hdr-bk" onclick="goBack()">'+svg('back')+'</button><div class="hdr-b"><div class="hdr-t">🛒 Pickup List</div></div><div class="hdr-r">';
  h+='<span style="font-size:.75rem;font-weight:600">Units:</span><input type="number" value="1" min="1" max="99" id="multIn" style="width:36px;text-align:center;padding:3px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-weight:700;font-size:.8rem">';
  h+='<button class="hdr-btn" onclick="clrP();render()">'+svg('reset')+' Reset</button>';
  h+='<button class="hdr-btn" onclick="window.print()">'+svg('print')+' Print</button>';
  h+='<button class="hdr-bk" onclick="goBack()">'+svg('x')+'</button>';
  h+='</div></div>';

  // Sub-assembly chips
  h+='<div class="pk-bar no-print"><div class="pk-chips">';
  h+='<div class="pk-chip '+(S.subFilter==='all'?'on':'')+'" data-sub="all">All</div>';
  l2s.forEach(function(s){h+='<div class="pk-chip '+(S.subFilter===s.id?'on':'')+'" data-sub="'+s.id+'">'+esc(s.component)+'</div>';});
  h+='</div></div>';

  // Progress
  h+='<div class="pk-prog"><b>'+pickedN+'</b>/'+totalPick+' picked — <b>'+pct+'%</b><div class="bar"><div class="fill" style="width:'+pct+'%"></div></div></div>';

  // Filter buttons
  h+='<div class="pk-flt no-print">';
  ['all','pending','picked','missing'].forEach(function(f){h+='<div class="pk-fb '+(S.filter===f?'on':'')+'" data-flt="'+f+'">'+f.charAt(0).toUpperCase()+f.slice(1)+'</div>';});
  h+='</div>';

  // Render BOM as grouped list
  h+=renderBomList(items,ff,idMap);

  // Bottom bar
  if(S.isAdmin){
    h+='<div class="bbar no-print">';
    h+='<button class="bbtn bbtn-s" onclick="trigCSV()">'+svg('up')+' Import CSV</button>';
    h+='<button class="bbtn bbtn-s" onclick="exportCSV()">'+svg('down')+' Export CSV</button>';
    h+='</div>';
  }
  return h;
}

function renderBomList(items,ff,idMap){
  var h='';var num=0;
  // Sort by sort_order
  var sorted=S.bom.slice().sort(function(a,b){return a.sort_order-b.sort_order;});
  // Render by walking sorted order, showing group headers for L2/L3
  sorted.forEach(function(b){
    // Check if in filtered set
    if(S.subFilter!=='all'){
      var inSub=b.id===S.subFilter||isDescendantOf(b.id,S.subFilter);
      if(!inSub)return;
    }
    var isLeaf=!S.bom.some(function(c){return c.parent_id===b.id;});
    // Group headers for L2 and L3
    if(b.level<=3&&!isLeaf){
      var lvCls=b.level===2?'gh-l2':b.level===3?'gh-l3':'gh-l4';
      var desc=getDescendantLeaves(b.id);
      var gPicked=desc.filter(function(d){return S.picks[d.id]==='picked';}).length;
      var gMissing=desc.filter(function(d){return S.picks[d.id]==='missing';}).length;
      var gTotal=desc.length;var gDone=gPicked+gMissing;
      h+='<div class="gh '+lvCls+'">';
      if(b.seq)h+='<span class="gh-seq">#'+esc(b.seq)+'</span>';
      h+='<span class="gh-name">'+esc(b.component)+'</span>';
      h+='<span class="gh-lv">L'+b.level+'</span>';
      h+='<span class="gh-prog">'+gDone+'/'+gTotal+'<span class="minibar"><span class="minifill" style="width:'+(gTotal?gDone/gTotal*100:0)+'%"></span></span></span>';
      h+='</div>';
      // Show PARTS sub-header
      if(b.level>=2)h+='<div class="gh-sub">'+svg('gear')+' PARTS</div>';
      return;
    }
    // Leaf parts
    if(!isLeaf)return;
    if(!ff(b))return;
    num++;
    var ps=S.picks[b.id]||'';
    h+='<div class="pr '+(ps==='picked'?'picked':ps==='missing'?'missing':'')+'">';
    h+='<span class="pr-num">'+num+'</span>';
    h+='<div class="pr-btns"><button class="pb ck '+(ps==='picked'?'on':'')+'" data-do="pick" data-id="'+b.id+'">'+svg('check')+'</button><button class="pb xx '+(ps==='missing'?'on':'')+'" data-do="miss" data-id="'+b.id+'">'+svg('x')+'</button></div>';
    if(b.seq)h+='<span class="pr-seq">'+esc(b.seq)+'</span>';
    h+='<div class="pr-body"><div class="pr-name">'+esc(b.component)+'</div>';
    if(b.part_number)h+='<div class="pr-pn">'+esc(b.part_number)+'</div>';
    if(b.fastener||b.loctite||b.torque){
      h+='<div class="pr-fast">';
      if(b.fastener)h+='<span class="pill pill-f">'+esc(b.fastener)+(b.f_qty?' ×'+b.f_qty:'')+'</span>';
      if(b.loctite)h+='<span class="pill pill-l">'+esc(b.loctite)+'</span>';
      if(b.torque)h+='<span class="pill pill-t">'+esc(b.torque)+'</span>';
      h+='</div>';
    }
    h+='</div>';
    h+='<span class="pr-qty">'+b.qty+'</span>';
    h+='</div>';
  });
  if(num===0)h+='<div class="lc">No items found</div>';
  return h;
}

function getDescendants(pid){var out=[];S.bom.forEach(function(b){if(isDescendantOf(b.id,pid))out.push(b);});return out;}
function getDescendantLeaves(pid){return getDescendants(pid).filter(function(b){return !S.bom.some(function(c){return c.parent_id===b.id;});});}
function isDescendantOf(id,ancestorId){var cur=S.bom.find(function(b){return b.id===id;});while(cur){if(cur.parent_id===ancestorId)return true;cur=S.bom.find(function(b){return b.id===cur.parent_id;});}return false;}

// Export CSV
function exportCSV(){
  if(!S.bom.length){toast('No BOM data','err');return;}
  var idMap={};S.bom.forEach(function(b){idMap[b.id]=b;});
  var csv='seq,level,component,parent,part_number,qty,status,fastener,f.qty,loctite,torque\n';
  S.bom.slice().sort(function(a,b){return a.sort_order-b.sort_order;}).forEach(function(b){
    var parentName=b.parent_id&&idMap[b.parent_id]?idMap[b.parent_id].component:'';
    csv+=[b.seq||'','L'+b.level,'"'+esc(b.component)+'"','"'+esc(parentName)+'"',b.part_number||'',b.qty,b.status||'NOT_STARTED','"'+(b.fastener||'')+'"',b.f_qty||'',b.loctite||'',b.torque||''].join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(S.selUnit?S.selUnit.name:'BOM')+'_export.csv';a.click();
}

// Bind
function bindAll(){
  document.querySelectorAll('[data-act="unit"]').forEach(function(el){el.onclick=function(){
    var id=el.dataset.id;S.selUnit=S.units.find(function(u){return u.id===id;});S.subFilter='all';S.filter='all';lodP();nav('pickup');loadBom(id);
  };});
  document.querySelectorAll('[data-do="pick"]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var id=el.dataset.id;S.picks[id]=S.picks[id]==='picked'?undefined:'picked';if(!S.picks[id])delete S.picks[id];savP();render();};});
  document.querySelectorAll('[data-do="miss"]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var id=el.dataset.id;S.picks[id]=S.picks[id]==='missing'?undefined:'missing';if(!S.picks[id])delete S.picks[id];savP();render();};});
  document.querySelectorAll('[data-sub]').forEach(function(el){el.onclick=function(){S.subFilter=el.dataset.sub==='all'?'all':el.dataset.sub;render();};});
  document.querySelectorAll('[data-flt]').forEach(function(el){el.onclick=function(){S.filter=el.dataset.flt;render();};});
}
</script>
