<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>揃い Soroi — Shop Floor Pickup</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#2563eb;--pri-dk:#1e40af;--pri-bg:rgba(37,99,235,.08);--pri-bg2:rgba(37,99,235,.14);--grn:#059669;--grn-bg:rgba(5,150,105,.08);--red:#dc2626;--red-bg:#fef2f2;--ylw:#d97706;--ylw-bg:#fffbeb;--card:#fff;--t1:#1e293b;--t2:#64748b;--t3:#94a3b8;--brd:#e2e8f0;--r:10px;--ok-bg:#f0fdf4;--ok:#15803d;--err-bg:#fef2f2;--err:#b91c1c;--sb:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;min-height:100dvh;color:var(--t1)}
button{font:inherit;cursor:pointer;border:none;background:none}
input,select{font:inherit}
a{color:inherit;text-decoration:none}
.shell{max-width:700px;margin:0 auto;padding:16px}
.bar{background:#fff;border-radius:var(--r);padding:14px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.bar-left{display:flex;align-items:center;gap:10px}
.bar h1{font-size:1.1rem;font-weight:700}
.bar-right{display:flex;align-items:center;gap:8px}
.chip{font-size:.8rem;color:var(--t2);background:#f8fafc;padding:4px 10px;border-radius:20px;border:1px solid var(--brd)}
.chip .rt{font-weight:600;color:var(--pri);margin-left:4px}
.lbtn{background:none;border:1px solid var(--brd);color:var(--t2);padding:5px 10px;border-radius:6px;font-size:.75rem;cursor:pointer}.lbtn:hover{border-color:var(--pri);color:var(--pri)}
.abtn{background:var(--pri-bg);border:none;border-radius:8px;padding:5px 10px;font-size:.78rem;cursor:pointer;color:var(--pri);font-weight:600;display:inline-flex;align-items:center;gap:4px}.abtn:hover{background:var(--pri-bg2)}
.card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.shdr h2{font-size:1.05rem;font-weight:700}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-dk)}
.btn-g{background:var(--grn);color:#fff}.btn-g:hover{background:#047857}
.btn-s{background:var(--pri-bg);color:var(--pri)}.btn-s:hover{background:var(--pri-bg2)}
.btn-d{background:var(--err-bg);color:var(--err)}.btn-d:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:.8rem}
.spinner{border:3px solid #e2e8f0;border-top:3px solid var(--pri);border-radius:50%;width:36px;height:36px;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Login */
#sec-login{text-align:center;padding:40px 20px}
.login-ico{width:80px;height:80px;border-radius:20px;margin:0 auto 16px;background:var(--pri);display:flex;align-items:center;justify-content:center;font-size:2.2rem;box-shadow:0 12px 32px rgba(37,99,235,.3);color:#fff}
.login-h{font-size:1.6rem;font-weight:800;margin-bottom:4px}.login-h span{color:var(--pri)}
.login-p{color:var(--t3);margin-bottom:20px;font-size:.9rem}
.login-btn{background:var(--pri);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:10px}.login-btn:hover{background:var(--pri-dk)}
#login-error{color:var(--err);margin-top:14px;display:none;font-size:.9rem}
/* Unit grid */
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.ucard{border:2px solid var(--brd);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .15s}
.ucard:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ucard .ico{font-size:2.2rem;margin-bottom:8px}
.ucard h3{font-size:.95rem;font-weight:700;margin-bottom:4px}
.ucard p{font-size:.78rem;color:var(--t3)}
/* Pickup */
.pk-info{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pk-tag{font-size:.78rem;padding:4px 12px;border-radius:16px;background:var(--pri-bg);color:var(--pri);font-weight:600}
.add-box{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:2px solid #bfdbfe;border-radius:12px;padding:16px;margin-bottom:16px}
.add-box h3{font-size:.9rem;font-weight:700;color:var(--pri);margin-bottom:10px}
.add-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.add-row input{flex:1;min-width:120px;padding:10px 12px;border:2px solid var(--pri);border-radius:8px;font-size:.95rem;font-weight:500}
.add-row input:focus{outline:none;border-color:var(--pri-dk)}
.add-row input.qty{width:70px;flex:none;text-align:center}
/* Cart table */
.ctbl{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:12px}
.ctbl th{text-align:left;padding:6px 10px;background:#f8fafc;border:1px solid var(--brd);font-weight:700;font-size:.72rem;text-transform:uppercase;color:var(--t2)}
.ctbl td{padding:6px 10px;border:1px solid var(--brd)}
.ctbl .pn{font-family:monospace;font-weight:600}
.ctbl .qc{width:50px;text-align:center;font-weight:700}
.ctbl .act{width:36px;text-align:center}
.ctbl .dbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:1rem;padding:2px 4px;border-radius:4px}.ctbl .dbtn:hover{color:var(--err)}
/* Settings */
.stp{margin-bottom:16px}
.stp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stp-label{font-size:.78rem;font-weight:600;color:var(--t2);min-width:70px;flex-shrink:0}
.stp-lang{display:flex;border-radius:6px;overflow:hidden;border:1.5px solid var(--brd)}
.stp-lb{padding:6px 14px;font-size:.78rem;font-weight:700;cursor:pointer;background:#fff;color:var(--t2);border:none}.stp-lb.on{background:var(--pri);color:#fff}
.stp-sid{flex:1;padding:7px 10px;border:1.5px solid var(--brd);border-radius:6px;font-size:.78rem;font-family:monospace;min-width:0}.stp-sid:focus{outline:none;border-color:var(--pri)}
/* Status */
.status{padding:10px 14px;border-radius:8px;margin-top:10px;text-align:center;font-size:.88rem;font-weight:500;display:none}
.status.ok{background:var(--ok-bg);color:var(--ok);display:block}
.status.err{background:var(--err-bg);color:var(--err);display:block}
.status.loading{background:var(--pri-bg);color:var(--pri);display:block}
.empty{text-align:center;padding:40px;color:var(--t3)}.empty .ico{font-size:2rem;margin-bottom:8px}
@media(max-width:600px){.shell{padding:10px}.bar{padding:12px 14px}.card{padding:14px}.ugrid{grid-template-columns:1fr 1fr}.add-row{flex-direction:column}.add-row input.qty{width:100%}}
</style>
</head>

<script>
// =====================================================
// CONFIG
// =====================================================
const SB_URL='https://wylxvmkcrexwfpjpbhyy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak';
const GIS_CID='1088099187141-ut0dn0scqt3h99htf3rg8gsrg2oo1ad8.apps.googleusercontent.com';
const sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'sb-soroi2-auth'}});

// =====================================================
// STATE
// =====================================================
let user=null,units=[],selUnit=null,cart=[],sheetId=localStorage.getItem('soroi_sid')||'',authReady=false;
let gisTokenClient=null,sheetsToken=localStorage.getItem('soroi_stk')||null;
let LANG=localStorage.getItem('soroi_lang')||'en';
let currentView='loading';

// =====================================================
// i18n
// =====================================================
const TR={
    en:{sub:'Shop Floor Pickup',selectUnit:'Select Unit',selectP:'Choose an assembly unit to start picking',tapStart:'Tap to start',noUnits:'No units yet',signIn:'Sign in with Google',out:'Out',admin:'Admin',language:'Lang',sheetId:'Sheet ID',addPart:'Add Part',pnPh:'Part Number',namePh:'Description',qtyPh:'Qty',add:'+ Add',cart:'Pickup Cart',submit:'📋 Submit to Sheet',clear:'Clear All',noItems:'No items in cart yet. Add parts above.',submitOk:'items submitted!',submitErr:'Submit failed',needAuth:'Sheets auth needed',connecting:'Connecting to Sheets...',submitting:'Submitting...'},
    ja:{sub:'工場ピックアップ',selectUnit:'ユニット選択',selectP:'ピックアップするユニットを選んでください',tapStart:'タップして開始',noUnits:'ユニットなし',signIn:'Googleでログイン',out:'ログアウト',admin:'管理',language:'言語',sheetId:'シートID',addPart:'部品追加',pnPh:'部品番号',namePh:'名称',qtyPh:'数量',add:'+ 追加',cart:'ピックアップカート',submit:'📋 シートに送信',clear:'全てクリア',noItems:'カートは空です。上から部品を追加してください。',submitOk:'件送信しました！',submitErr:'送信失敗',needAuth:'Sheets認証が必要です',connecting:'Sheets接続中...',submitting:'送信中...'}
};
function t(k){return(TR[LANG]&&TR[LANG][k])||TR.en[k]||k;}
function setLang(l){LANG=l;localStorage.setItem('soroi_lang',l);if(currentView==='home')renderHome();if(currentView==='pickup')renderPickup();}

// =====================================================
// HELPERS
// =====================================================
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function $(id){return document.getElementById(id);}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function nowTime(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function showSt(id,msg,type){const e=$(id);if(!e)return;e.textContent=msg;e.className='status '+type;}
function hideSt(id){const e=$(id);if(e)e.className='status';}

// =====================================================
// AUTH (copied from Part Inventory — proven pattern)
// =====================================================
window.onload=function(){
    sb.auth.onAuthStateChange(async(ev,session)=>{
        if(session&&session.user&&(ev==='SIGNED_IN'||ev==='TOKEN_REFRESHED'||ev==='INITIAL_SESSION')){
            await checkRole(session.user);authReady=true;
        }
        else if(ev==='SIGNED_OUT'||(ev==='INITIAL_SESSION'&&!session)){user=null;authReady=true;nav('login');}
    });
    setTimeout(()=>{if(!authReady)nav('login');},4000);
    initGIS();
};

async function doLogin(){
    const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+window.location.pathname}});
    if(error){$('login-error').textContent='Login failed: '+error.message;$('login-error').style.display='block';}
}
async function doLogout(){
    await sb.auth.signOut();user=null;cart=[];sheetsToken=null;localStorage.removeItem('soroi_stk');
    $('bar-right').style.display='none';nav('login');
}

async function checkRole(u){
    const fb=(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0];
    user={email:u.email,name:fb,isAdmin:false};
    try{
        const{data}=await sb.from('authentication_mode_user_roles').select('name,role').eq('email',u.email);
        if(data&&data.length>0){user.name=data[0].name||fb;user.isAdmin=(data[0].role||'').toLowerCase().trim()==='admin';}
    }catch(e){console.warn('Role check:',e);}
    if(u.email==='mangaonkaraniket@gmail.com'||u.email==='anikettelexistence@gmail.com')user.isAdmin=true;
    console.log('Auth:',user.email,'admin:',user.isAdmin);
    // Update header
    $('user-chip').innerHTML=esc(user.name)+(user.isAdmin?'<span class="rt">admin</span>':'');
    $('bar-right').style.display='flex';
    $('admin-link').style.display=user.isAdmin?'inline-flex':'none';
    // Load data then navigate
    await loadAll();
    if(currentView==='loading'||currentView==='login')nav('home');
    else if(currentView==='home')renderHome();
}

// =====================================================
// GIS (copied from Part Inventory — silent re-auth)
// =====================================================
function initGIS(){
    if(typeof google==='undefined'||!google.accounts){setTimeout(initGIS,300);return;}
    gisTokenClient=google.accounts.oauth2.initTokenClient({
        client_id:GIS_CID,scope:'https://www.googleapis.com/auth/spreadsheets',
        callback:r=>{if(r.access_token){sheetsToken=r.access_token;localStorage.setItem('soroi_stk',sheetsToken);console.log('GIS: token obtained');}}
    });
    console.log('GIS: initialized');
}

function gisReAuth(){
    return new Promise((resolve,reject)=>{
        if(!gisTokenClient){reject(new Error('GIS not ready'));return;}
        let done=false;
        const origCb=gisTokenClient.callback;
        gisTokenClient.callback=r=>{
            if(done)return;done=true;gisTokenClient.callback=origCb;
            if(r.access_token){sheetsToken=r.access_token;localStorage.setItem('soroi_stk',sheetsToken);resolve();}
            else reject(new Error('Token failed'));
        };
        gisTokenClient.requestAccessToken({prompt:''});
        setTimeout(()=>{if(!done){done=true;gisTokenClient.callback=origCb;reject(new Error('Re-auth timeout'));}},15000);
    });
}

function gisRequestToken(){
    if(!gisTokenClient){alert('Google auth loading. Try again in a few seconds.');return;}
    gisTokenClient.requestAccessToken();
}

async function sheetsApi(url,options={},isRetry=false){
    if(!sheetsToken)sheetsToken=localStorage.getItem('soroi_stk');
    if(!sheetsToken)throw new Error('NEEDS_GIS_AUTH');
    const r=await fetch(url,{...options,headers:{'Authorization':'Bearer '+sheetsToken,'Content-Type':'application/json',...(options.headers||{})}});
    if(r.status===401&&!isRetry){
        try{await gisReAuth();return sheetsApi(url,options,true);}catch(e){
            sheetsToken=null;localStorage.removeItem('soroi_stk');throw new Error('NEEDS_GIS_AUTH');
        }
    }
    if(!r.ok){const txt=await r.text();throw new Error('Sheets '+r.status+': '+txt);}
    return r.json();
}

// =====================================================
// DATA
// =====================================================
async function loadAll(){
    try{
        const{data,error}=await sb.from('soroi_app_units').select('*').order('sort_order');
        if(error){console.error('loadAll:',error);units=[];}
        else{units=data||[];}
        console.log('Units loaded:',units.length);
    }catch(e){console.error('loadAll:',e);units=[];}
}

// =====================================================
// NAVIGATION
// =====================================================
function nav(view){
    currentView=view;
    $('sec-loading').style.display='none';
    $('sec-login').style.display='none';
    $('sec-home').style.display='none';
    $('sec-pickup').style.display='none';
    switch(view){
        case'loading':$('sec-loading').style.display='block';break;
        case'login':$('sec-login').style.display='block';$('login-sub').textContent=t('sub');break;
        case'home':renderHome();$('sec-home').style.display='block';break;
        case'pickup':renderPickup();$('sec-pickup').style.display='block';break;
    }
}

// =====================================================
// HOME VIEW
// =====================================================
function renderHome(){
    const el=$('sec-home');
    let h='<div class="card"><div class="shdr"><h2>'+t('selectUnit')+'</h2></div><p style="color:var(--t3);font-size:.85rem;margin-bottom:16px">'+t('selectP')+'</p>';
    // Settings row
    h+='<div class="stp">';
    h+='<div class="stp-row"><span class="stp-label">'+t('language')+'</span><div class="stp-lang"><button class="stp-lb'+(LANG==='en'?' on':'')+'" onclick="setLang(\'en\')">EN</button><button class="stp-lb'+(LANG==='ja'?' on':'')+'" onclick="setLang(\'ja\')">日本語</button></div></div>';
    h+='<div class="stp-row"><span class="stp-label">'+t('sheetId')+'</span><input class="stp-sid" value="'+esc(sheetId)+'" placeholder="Google Sheet ID" onchange="sheetId=this.value.trim();localStorage.setItem(\'soroi_sid\',sheetId)"></div>';
    h+='</div>';
    // Unit grid
    h+='<div class="ugrid">';
    units.forEach(u=>{
        const c=u.color||'#2563eb';
        h+='<div class="ucard" onclick="openUnit(\''+u.id+'\')" style="border-top:3px solid '+c+'"><div class="ico">'+esc(u.icon||'📦')+'</div><h3>'+esc(u.name)+'</h3><p>'+t('tapStart')+'</p></div>';
    });
    if(!units.length)h+='<div class="empty"><div class="ico">📦</div><p>'+t('noUnits')+'</p></div>';
    h+='</div></div>';
    el.innerHTML=h;
}

function openUnit(id){
    if(!user){doLogin();return;}
    selUnit=units.find(u=>u.id===id);
    if(!selUnit)return;
    cart=[];
    nav('pickup');
}

// =====================================================
// PICKUP VIEW
// =====================================================
function renderPickup(){
    if(!selUnit)return;
    const el=$('sec-pickup');
    let h='<div class="card">';
    h+='<div class="shdr"><h2>'+(selUnit.icon||'📦')+' '+esc(selUnit.name)+'</h2><button class="btn btn-s btn-sm" onclick="goHome()">← Back</button></div>';
    h+='<div class="pk-info"><span class="pk-tag">📅 '+today()+'</span><span class="pk-tag">👤 '+esc(user?user.name:'')+'</span></div>';
    // Add part box
    h+='<div class="add-box"><h3>'+t('addPart')+'</h3>';
    h+='<div class="add-row"><input id="inp-pn" placeholder="'+t('pnPh')+'" style="font-family:monospace"><input id="inp-name" placeholder="'+t('namePh')+'"><input id="inp-qty" class="qty" type="number" value="1" min="1" placeholder="'+t('qtyPh')+'"></div>';
    h+='<button class="btn btn-p" onclick="addToCart()">'+t('add')+'</button>';
    h+='</div>';
    // Cart
    h+='<div class="shdr" style="margin-top:8px"><h2>'+t('cart')+' ('+cart.length+')</h2>';
    if(cart.length)h+='<button class="btn btn-d btn-sm" onclick="cart=[];renderPickup()">'+t('clear')+'</button>';
    h+='</div>';
    if(cart.length){
        h+='<table class="ctbl"><thead><tr><th>#</th><th>'+t('pnPh')+'</th><th>'+t('namePh')+'</th><th>'+t('qtyPh')+'</th><th class="act"></th></tr></thead><tbody>';
        cart.forEach((c,i)=>{
            h+='<tr><td>'+(i+1)+'</td><td class="pn">'+esc(c.pn)+'</td><td>'+esc(c.name)+'</td><td class="qc">'+c.qty+'</td><td class="act"><button class="dbtn" onclick="cart.splice('+i+',1);renderPickup()">✕</button></td></tr>';
        });
        h+='</tbody></table>';
        h+='<button class="btn btn-g" onclick="submitToSheet()" style="width:100%">'+t('submit')+'</button>';
    }else{
        h+='<div class="empty"><div class="ico">📋</div><p>'+t('noItems')+'</p></div>';
    }
    h+='<div class="status" id="pk-status"></div>';
    h+='</div>';
    el.innerHTML=h;
    // Focus PN input
    setTimeout(()=>{const inp=$('inp-pn');if(inp)inp.focus();},50);
}

function goHome(){selUnit=null;cart=[];nav('home');}

function addToCart(){
    const pn=($('inp-pn').value||'').trim();
    const name=($('inp-name').value||'').trim();
    const qty=parseInt($('inp-qty').value)||1;
    if(!pn&&!name)return;
    cart.push({pn:pn,name:name||pn,qty:qty});
    renderPickup();
}

// =====================================================
// SUBMIT TO GOOGLE SHEETS (Part Inventory pattern)
// =====================================================
async function submitToSheet(){
    if(!cart.length)return;
    if(!sheetId){showSt('pk-status','Set Sheet ID in settings first','err');return;}
    showSt('pk-status',t('submitting'),'loading');
    try{
        const tab=selUnit?selUnit.name:'Pickup';
        // Check/create tab
        const info=await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'?fields=sheets.properties.title');
        if(!info.sheets.some(s=>s.properties.title===tab)){
            await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+':batchUpdate',{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})});
            await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A1:F1?valueInputOption=RAW',{method:'PUT',body:JSON.stringify({values:[['Date','Time','Operator','Part Number','Description','Qty']]})});
        }
        // Find next row
        const col=await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A:A');
        const nextRow=(col.values?col.values.length:0)+1;
        // Write rows
        const rows=cart.map(c=>[today(),nowTime(),user?user.name:'',c.pn,c.name,c.qty]);
        await sheetsApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A'+nextRow+':F'+(nextRow+rows.length-1)+'?valueInputOption=USER_ENTERED',{method:'PUT',body:JSON.stringify({values:rows})});
        showSt('pk-status','✅ '+cart.length+' '+t('submitOk'),'ok');
        cart=[];
        setTimeout(()=>{renderPickup();},2000);
    }catch(e){
        console.error(e);
        if(e.message==='NEEDS_GIS_AUTH'){
            showSt('pk-status',t('needAuth'),'err');
            const st=$('pk-status');
            if(st)st.innerHTML+='<br><button onclick="gisRequestToken()" style="margin-top:8px;padding:8px 16px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">🔑 Connect Google Sheets</button>';
        }else{
            showSt('pk-status',t('submitErr')+': '+e.message,'err');
        }
    }
}
</script>
</body>
</html>
