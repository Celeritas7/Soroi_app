.stp-link{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:.8rem;font-weight:600;background:var(--sf);border:1.5px solid var(--bd);color:var(--t2);text-decoration:none;transition:all .12s}.stp-link:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-bg)}
.stp-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.stp-divider{height:1px;background:var(--bd);margin:10px 0}
@media(max-width:600px){.ugrid{grid-template-columns:1fr}.info-bar{flex-direction:column;gap:6px}.stp-row{flex-wrap:wrap}}

async function doLogin(){var r=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}});if(r.error)toast('Login failed','err');}
async function doLogout(){await sb.auth.signOut();S.user=null;S.cart=[];nav('home');loadUnits();}
async function ckRole(u){var fb=(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0];S.user={email:u.email,name:fb};var admin=false;try{var r=await sb.from('authentication_mode_user_roles').select('name,role').eq('email',u.email);if(r.data&&r.data.length>0){S.user.name=r.data[0].name||fb;admin=(r.data[0].role||'').toLowerCase().trim()==='admin';}}catch(e){console.warn('Role check failed:',e);}if(u.email==='mangaonkaraniket@gmail.com'||u.email==='anikettelexistence@gmail.com')admin=true;S.user.isAdmin=admin;console.log('Auth:',S.user.email,'admin:',admin,'view:',S.view);if(S.view==='login'||S.view==='loading'){nav('home');loadUnits();}else{render();}}
function initGIS(){if(typeof google==='undefined'||!google||!google.accounts){setTimeout(initGIS,300);return;}gisC=google.accounts.oauth2.initTokenClient({client_id:GIS_CID,scope:'https://www.googleapis.com/auth/spreadsheets',callback:function(r){if(r.access_token){sTk=r.access_token;localStorage.setItem('soroi_stk',sTk);toast(t('connected'),'ok');}}});}

// Data
async function loadUnits(){try{var r=await sb.from('soroi_app_units').select('*').order('sort_order');S.units=r.data||[];}catch(e){}render();}
async function loadBom(uid){S.bomLoading=true;render();try{var r=await sb.from('soroi_app_bom').select('*').eq('unit_id',uid).order('sort_order');if(r.error){console.error('loadBom error:',r.error);toast('BOM: '+r.error.message,'err');S.bom=[];}else{S.bom=r.data||[];console.log('BOM loaded:',S.bom.length,'items for',uid);}S.allBom[uid]=S.bom;}catch(e){console.error('loadBom exception:',e);toast('BOM load failed','err');}S.bomLoading=false;render();}
function retryBom(){if(S.selUnit)loadBom(S.selUnit.id);}
async function loadAllBom(){for(var i=0;i<S.units.length;i++){var uid=S.units[i].id;if(!S.allBom[uid]){try{var r=await sb.from('soroi_app_bom').select('*').eq('unit_id',uid).order('sort_order');S.allBom[uid]=r.data||[];}catch(e){}}}}

// Nav
function nav(v){S.view=v;S.searchQ='';render();}
function goBack(){if(S.view==='pickup'){S.selUnit=null;S.bom=[];S.mode='bulk';S.view='home';render();loadUnits();}else nav('home');}
function openUnit(id){if(!S.user){toast(t('loginFirst'),'err');doLogin();return;}S.selUnit=S.units.find(function(u){return u.id===id;});S.cart=[];S.mode='bulk';S.bomLoading=true;S.bom=[];nav('pickup');loadBom(id);loadAllBom();}

// Render
function render(){var a=$('app');switch(S.view){case'loading':a.innerHTML='<div class="lc" style="min-height:100dvh;justify-content:center"><div class="spin"></div></div>';break;case'login':a.innerHTML=vLogin();break;case'home':a.innerHTML=vHome();break;case'pickup':a.innerHTML=vPickup();break;}bindAll();}
function vLogin(){return '<div class="lgn"><div class="lgn-ic">'+svg('cart')+'</div><div class="lgn-h"><span>揃い</span> Soroi</div><div class="lgn-p">'+t('sub')+'</div><button class="lgn-btn" onclick="doLogin()">'+GL+' '+t('signIn')+'</button></div>';}
function vHome(){
  var h='<div class="hdr"><div class="hdr-b"><div class="hdr-t">🛒 '+t('title')+'</div><div class="hdr-s">'+t('sub')+'</div></div><div class="hdr-r">';
  if(S.user){
    h+='<span style="font-size:.78rem;opacity:.8;font-weight:500">'+esc(S.user.name)+'</span>';
    if(S.user.isAdmin)h+='<span style="font-size:.6rem;background:rgba(255,255,255,.2);padding:2px 6px;border-radius:4px;font-weight:700">ADMIN</span>';
  }
  h+='<button class="hdr-btn" onclick="S.settingsOpen=!S.settingsOpen;render()" title="'+t('settings')+'">'+svg('gear')+'</button>';
  if(S.user){h+='<button class="hdr-btn" onclick="doLogout()">'+t('out')+'</button>';}
  else{h+='<button class="hdr-btn" onclick="doLogin()" style="gap:6px">'+GL+' '+t('signIn')+'</button>';}
  h+='</div></div>';
  // Settings panel
  h+='<div class="stp'+(S.settingsOpen?' open':'')+'">';
  h+='<div class="stp-inner">';
  h+='<div class="stp-row"><span class="stp-label">'+t('language')+'</span><div class="stp-lang"><button class="stp-lb'+(LANG==='en'?' on':'')+'" onclick="setLang(\'en\')">EN</button><button class="stp-lb'+(LANG==='ja'?' on':'')+'" onclick="setLang(\'ja\')">日本語</button></div></div>';
  h+='<div class="stp-row"><span class="stp-label">'+t('sheetId')+'</span><input class="stp-sid" id="stpSid" value="'+esc(S.sheetId)+'" placeholder="Google Sheet ID" onchange="S.sheetId=this.value.trim();localStorage.setItem(\'soroi_sid\',S.sheetId)"></div>';
  if(S.user&&S.user.isAdmin){h+='<div class="stp-divider"></div>';h+='<div class="stp-row"><span class="stp-label">'+t('adminTools')+'</span><a class="stp-link" href="admin.html">'+svg('extlink')+' '+t('openAdmin')+'</a></div>';}
  h+='</div></div>';
  h+='<div class="home-hdr fade"><h2>'+t('selectUnit')+'</h2><p>'+t('selectUnitP')+'</p></div>';
  if(S.user)h+='<div class="info-bar fade"><div class="info-chip">📅 <b>'+today()+'</b></div><div class="info-chip">👤 <b>'+esc(S.user.name)+'</b></div></div>';
  h+='<div class="ugrid fade">';
  S.units.forEach(function(u){var c=u.color||'#2563eb';h+='<div class="ucard" data-unit="'+u.id+'" style="border-top-color:'+c+'"><div class="ucard-ico" style="background:'+c+'12">'+esc(u.icon||'📦')+'</div><div class="ucard-b"><div class="ucard-n">'+esc(u.name)+'</div><div class="ucard-d">'+t('tapStart')+'</div></div><div class="ucard-a">'+svg('chev')+'</div></div>';});
  if(!S.units.length)h+='<div class="empty-msg">'+t('noUnits')+'</div>';
  h+='</div>';return h;}

function vPickup(){
  var u=S.selUnit;if(!u)return '';
  var childSet=new Set();S.bom.forEach(function(b){if(b.parent_id)childSet.add(b.parent_id);});
  var h='<div class="hdr"><button class="hdr-bk" onclick="goBack()">'+svg('back')+'</button><div class="hdr-b"><div class="hdr-t">'+esc(u.icon||'📦')+' '+esc(u.name)+'</div><div class="hdr-s">'+today()+' · '+esc(S.user?S.user.name:'')+'</div></div><div class="hdr-r"><button class="hdr-bk" onclick="goBack()">'+svg('x')+'</button></div></div>';
  h+='<div class="mode-bar fade"><div class="mode-btn'+(S.mode==='bulk'?' on':'')+'" data-mode="bulk">'+t('bulk')+'</div><div class="mode-btn'+(S.mode==='individual'?' on':'')+'" data-mode="individual">'+t('indiv')+'</div></div>';
  if(S.bomLoading){h+='<div class="lc" style="padding:60px"><div class="spin"></div></div>';if(S.cart.length)h+=vCart();return h;}
  if(S.mode==='bulk')h+=vBulk(childSet);else h+=vIndiv(childSet);
  if(S.cart.length)h+=vCart();return h;}

function vBulk(childSet){
  var groups=S.bom.filter(function(b){return childSet.has(b.id)&&b.level>=2;});
  var GC=['#2e7d32','#1565c0','#c62828','#6a1b9a','#e65100','#00838f','#f57f17','#4e342e','#283593','#bf360c'];
  var h='<div class="sub-list fade">';
  if(!groups.length){h+='<div class="empty-msg">'+(S.bom.length?t('noSub'):t('noBom'))+'<br><button onclick="retryBom()" style="margin-top:12px;padding:8px 20px;border-radius:var(--r);background:var(--pri);color:#fff;font-weight:600;font-size:.82rem;cursor:pointer;border:none">↻ Retry</button></div></div>';return h;}
  groups.forEach(function(g,i){var leaves=getLeaves(g.id);h+='<div class="sub-card" data-sub="'+g.id+'"><div class="sub-ico" style="background:'+GC[i%GC.length]+'"></div><div class="sub-b"><div class="sub-n">'+esc(g.component)+'</div><div class="sub-d">'+(g.part_number?esc(g.part_number)+' · ':'')+'L'+g.level+'</div></div><div class="sub-cnt">'+leaves.length+' '+t('parts')+'</div><div class="sub-a">'+svg('chev')+'</div></div>';});
  h+='</div>';return h;}

function confirmBulk(gid){
  var g=S.bom.find(function(b){return b.id===gid;});if(!g)return;
  var leaves=getLeaves(gid);if(!leaves.length){toast('No parts','err');return;}
  var lh='<div class="cf-list">';leaves.forEach(function(p){lh+='<div class="cf-row"><span class="cf-pn">'+esc(p.part_number||'—')+'</span><span class="cf-nm">'+esc(p.component)+'</span><span class="cf-qty">×'+p.qty+'</span></div>';});lh+='</div>';
  modal('Bulk: '+g.component,t('addAll')+' '+leaves.length+' '+t('parts')+'?',lh,[{label:t('cancel'),cls:'mdc'},{label:t('addAll')+' ('+leaves.length+')',cls:'mdo',fn:function(){
    leaves.forEach(function(p){S.cart.push({part_number:p.part_number||'',component:p.component,qty:p.qty,mode:'bulk',group:g.component,unit:S.selUnit.name});});
    toast(t('added')+' '+leaves.length+' '+t('parts'),'ok');render();}}]);}

function vIndiv(childSet){
  var leaves=S.bom.filter(function(b){return !childSet.has(b.id);});
  var fasteners={};leaves.forEach(function(b){var pn=(b.part_number||'').toUpperCase();if(/^CB[EST]/.test(pn)){var base=pn.replace(/-\d+$/,'');fasteners[base]=(fasteners[base]||0)+1;}});
  var chips=Object.keys(fasteners).sort();
  var h='<div class="search-wrap fade">';
  if(chips.length){h+='<div class="chip-wrap">';chips.forEach(function(c){h+='<div class="f-chip" data-chip="'+esc(c)+'">'+esc(c)+'</div>';});h+='</div>';}
  h+='<div class="search-box"><div class="search-ico">'+svg('search')+'</div><input class="search-in" id="searchIn" type="text" placeholder="'+t('searchPh')+'" value="'+esc(S.searchQ)+'" autocomplete="off"></div>';
  if(S.searchQ.length>=2){
    var q=S.searchQ.toLowerCase();
    var matches=leaves.filter(function(b){return(b.part_number||'').toLowerCase().indexOf(q)>=0||(b.component||'').toLowerCase().indexOf(q)>=0;}).slice(0,20);
    var others=[];S.units.forEach(function(ou){if(ou.id===S.selUnit.id)return;(S.allBom[ou.id]||[]).forEach(function(b){if((b.part_number||'').toLowerCase().indexOf(q)>=0||(b.component||'').toLowerCase().indexOf(q)>=0)others.push({b:b,unit:ou.name});});});
    if(matches.length){
      h+='<div style="padding:6px 0;font-size:.78rem;color:var(--t2);font-weight:600">'+matches.length+' in '+esc(S.selUnit.name)+':</div>';
      matches.forEach(function(b){h+='<div class="sub-card" data-addpart="'+b.id+'" style="padding:10px 14px"><div class="sub-b"><div class="sub-n" style="font-family:var(--mn)">'+esc(b.part_number||'—')+'</div><div class="sub-d">'+esc(b.component)+'</div></div><div class="sub-cnt">×'+b.qty+'</div><div class="sub-a">'+svg('plus')+'</div></div>';});}
    else if(!others.length)h+='<div class="empty-msg">'+t('notFound')+' "'+esc(S.searchQ)+'"</div>';
    if(others.length&&!matches.length){var unames=[...new Set(others.map(function(m){return m.unit;}))];h+='<div style="padding:10px;margin-top:8px;background:var(--ylw-bg);border:1.5px solid #fbbf24;border-radius:8px;font-size:.82rem">⚠️ <b>"'+esc(S.searchQ)+'"</b> '+t('foundIn')+' <b>'+esc(S.selUnit.name)+'</b>. '+t('foundInOther')+' <b>'+unames.join(', ')+'</b></div>';}
  }
  h+='</div>';return h;}

function addIndivPart(bid){
  var b=S.bom.find(function(p){return p.id===bid;});if(!b)return;
  modal(t('addPart'),'<b>'+esc(b.part_number||b.component)+'</b>','<div style="margin-bottom:8px;font-size:.82rem;color:var(--t2)">'+esc(b.component)+'</div><input class="md-input" id="ind-qty" type="number" value="'+b.qty+'" min="1" placeholder="Quantity">',[{label:t('cancel'),cls:'mdc'},{label:t('addPart'),cls:'mdo',fn:function(){
    var qty=parseInt($('ind-qty').value)||1;S.cart.push({part_number:b.part_number||'',component:b.component,qty:qty,mode:'individual',group:'',unit:S.selUnit.name});
    toast(t('added')+': '+(b.part_number||b.component),'ok');S.searchQ='';render();}}]);}

function vCart(){
  var h='<div class="cart fade"><div class="cart-hdr"><div class="cart-t">'+svg('cart')+' '+t('cart')+' <span class="cart-badge">'+S.cart.length+'</span></div><span class="cart-expand" onclick="S.cartOpen=!S.cartOpen;render()">'+(S.cartOpen?t('hide'):t('show'))+'</span></div>';
  h+='<div class="cart-items'+(S.cartOpen?' open':'')+'">';
  S.cart.forEach(function(c,i){h+='<div class="ci"><span class="ci-pn">'+esc(c.part_number||c.component)+'</span><span class="ci-qty">×'+c.qty+'</span><span class="ci-mode">'+c.mode+'</span><button class="ci-del" onclick="event.stopPropagation();S.cart.splice('+i+',1);render()">'+svg('x')+'</button></div>';});
  h+='</div><div class="cart-acts"><button class="cart-btn cart-clr" onclick="S.cart=[];render()">'+t('clear')+'</button><button class="cart-btn cart-sub" onclick="submitCart()">'+t('submit')+' ('+S.cart.length+')</button></div></div>';return h;}

// Google Sheets Submit
async function submitCart(){
  if(!S.cart.length){toast(t('cartEmpty'),'err');return;}
  if(!S.sheetId){modal(t('sheetId'),t('sheetReq'),'<input class="md-input" id="sub-sid" placeholder="Sheet ID" value="'+esc(S.sheetId)+'">',[{label:t('cancel'),cls:'mdc'},{label:t('saveSubmit'),cls:'mdo',fn:function(){S.sheetId=$('sub-sid').value.trim();localStorage.setItem('soroi_sid',S.sheetId);if(S.sheetId)submitCart();}}]);return;}
  if(!sTk){if(gisC)gisC.requestAccessToken();toast(t('connected')+'...','');return;}
  toast(t('submitting')+' '+S.cart.length+' '+t('items')+'...','');
  try{
    var tab=S.selUnit?S.selUnit.name:'Pickup';
    var info=await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+S.sheetId+'?fields=sheets.properties.title');
    if(!info.sheets.some(function(s){return s.properties.title===tab;})){
      await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+S.sheetId+':batchUpdate',{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})});
      await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+S.sheetId+'/values/'+encodeURIComponent(tab)+'!A1:H1?valueInputOption=RAW',{method:'PUT',body:JSON.stringify({values:[['Date','Time','Operator','Part Number','Description','Qty','Mode','Sub-Assembly']]})});}
    var col=await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+S.sheetId+'/values/'+encodeURIComponent(tab)+'!A:A');
    var nr=(col.values?col.values.length:0)+1;
    var rows=S.cart.map(function(c){return[today(),nowTime(),S.user?S.user.name:'',c.part_number,c.component,c.qty,c.mode,c.group||''];});
    await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+S.sheetId+'/values/'+encodeURIComponent(tab)+'!A'+nr+':H'+(nr+rows.length-1)+'?valueInputOption=USER_ENTERED',{method:'PUT',body:JSON.stringify({values:rows})});
    toast('✅ '+S.cart.length+' '+t('items')+' → "'+tab+'"','ok');S.cart=[];S.cartOpen=false;render();
  }catch(e){console.error(e);if(e.message&&e.message.indexOf('401')>=0){sTk=null;localStorage.removeItem('soroi_stk');if(gisC)gisC.requestAccessToken();toast(t('reauth'),'');}else toast(t('failed')+' '+e.message,'err');}}
async function sApi(url,opts){if(!sTk)throw new Error('No token');var r=await fetch(url,Object.assign({headers:{'Authorization':'Bearer '+sTk,'Content-Type':'application/json'}},opts||{}));if(!r.ok){var t=await r.text();throw new Error(r.status+': '+t);}return r.json();}

// Helpers
function getLeaves(pid){var out=[];S.bom.forEach(function(b){if(isDesc(b.id,pid)&&!S.bom.some(function(c){return c.parent_id===b.id;}))out.push(b);});return out;}
function isDesc(id,anc){var cur=S.bom.find(function(b){return b.id===id;});while(cur){if(cur.parent_id===anc)return true;cur=S.bom.find(function(b){return b.id===cur.parent_id;});}return false;}

// Bindings
function bindAll(){
  document.querySelectorAll('[data-unit]').forEach(function(el){el.onclick=function(){openUnit(el.dataset.unit);};});
  document.querySelectorAll('[data-mode]').forEach(function(el){el.onclick=function(){S.mode=el.dataset.mode;render();};});
  document.querySelectorAll('[data-sub]').forEach(function(el){el.onclick=function(){confirmBulk(el.dataset.sub);};});
  document.querySelectorAll('[data-addpart]').forEach(function(el){el.onclick=function(){addIndivPart(el.dataset.addpart);};});
  document.querySelectorAll('[data-chip]').forEach(function(el){el.onclick=function(){S.searchQ=el.dataset.chip;render();setTimeout(function(){var inp=$('searchIn');if(inp){inp.focus();inp.selectionStart=inp.value.length;}},50);};});
  var si=$('searchIn');if(si){si.oninput=function(){S.searchQ=this.value;render();setTimeout(function(){var inp=$('searchIn');if(inp){inp.focus();inp.selectionStart=inp.value.length;}},10);};}
}
</script>
