        }else if(ev==='SIGNED_OUT'||(ev==='INITIAL_SESSION'&&!sess)){
            user=null;authReady=true;nav('home');
        }
    });
    setTimeout(function(){if(!authReady)nav('home');},4000);
    initGIS();
};
async function doLogin(){var r=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}});if(r.error)toast('Login failed','err');}
async function doLogout(){await sb.auth.signOut();user=null;cart=[];nav('home');}
async function checkRole(u){
    var fb=(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0];
    user={email:u.email,name:fb,isAdmin:false};
    try{var r=await sb.from('authentication_mode_user_roles').select('name,role').eq('email',u.email);if(r.data&&r.data.length>0){user.name=r.data[0].name||fb;user.isAdmin=(r.data[0].role||'').toLowerCase().trim()==='admin';}}catch(e){console.warn('Role check:',e);}
    if(u.email==='mangaonkaraniket@gmail.com'||u.email==='anikettelexistence@gmail.com')user.isAdmin=true;
    console.log('Auth:',user.email,'admin:',user.isAdmin);
    await loadAll();
    nav('home');
}
function initGIS(){if(typeof google==='undefined'||!google||!google.accounts){setTimeout(initGIS,300);return;}gisC=google.accounts.oauth2.initTokenClient({client_id:GIS_CID,scope:'https://www.googleapis.com/auth/spreadsheets',callback:function(r){if(r.access_token){sTk=r.access_token;localStorage.setItem('soroi_stk',sTk);toast(t('connected'),'ok');}}});}

/* === DATA === */
async function loadAll(){try{var r=await sb.from('soroi_app_units').select('*').order('sort_order');units=r.data||[];console.log('Units loaded:',units.length);}catch(e){console.error('loadAll:',e);}}
async function loadBom(uid){try{var r=await sb.from('soroi_app_bom').select('*').eq('unit_id',uid).order('sort_order');if(r.error){console.error('loadBom:',r.error);bom=[];}else{bom=r.data||[];}allBom[uid]=bom;console.log('BOM:',bom.length,'for',uid);}catch(e){console.error('loadBom:',e);bom=[];}}
async function loadAllBom(){for(var i=0;i<units.length;i++){var uid=units[i].id;if(!allBom[uid]){try{var r=await sb.from('soroi_app_bom').select('*').eq('unit_id',uid).order('sort_order');allBom[uid]=r.data||[];}catch(e){}}}}

/* === NAV (show/hide) === */
function nav(view){
    currentView=view;settingsOpen=false;$('sec-settings').className='stp';
    ['sec-loading','sec-login','sec-home','sec-pickup'].forEach(function(id){$(id).style.display='none';});
    switch(view){
        case'loading':$('sec-loading').style.display='block';break;
        case'login':renderLogin();$('sec-login').style.display='block';break;
        case'home':renderHome();$('sec-home').style.display='block';renderSettings();break;
        case'pickup':$('sec-pickup').style.display='block';break;
    }
    updateHeader();
}
function updateHeader(){
    var hb=$('hdr-back'),ht=$('hdr-title'),hs=$('hdr-sub'),hr=$('hdr-right');
    if(currentView==='pickup'&&selUnit){
        hb.innerHTML='<div class="hdr-bk" onclick="goBack()">'+svg('back')+'</div>';hb.style.display='block';
        ht.textContent=(selUnit.icon||'📦')+' '+selUnit.name;
        hs.textContent=today()+' · '+(user?user.name:'');
        hr.innerHTML='<div class="hdr-bk" onclick="goBack()">'+svg('x')+'</div>';
    }else{
        hb.style.display='none';ht.textContent='🛒 揃い Soroi';hs.textContent=t('sub');
        var h='';
        if(user){h+='<span style="font-size:.78rem;opacity:.8;font-weight:500">'+esc(user.name)+'</span>';if(user.isAdmin)h+='<span style="font-size:.6rem;background:rgba(255,255,255,.2);padding:2px 6px;border-radius:4px;font-weight:700">ADMIN</span>';}
        h+='<button class="hdr-btn" onclick="toggleSettings()" title="'+t('settings')+'">'+svg('gear')+'</button>';
        if(user){h+='<button class="hdr-btn" onclick="doLogout()">'+t('out')+'</button>';}else{h+='<button class="hdr-btn" onclick="doLogin()" style="gap:6px">'+GL+' '+t('signIn')+'</button>';}
        hr.innerHTML=h;
    }
}
function toggleSettings(){settingsOpen=!settingsOpen;$('sec-settings').className=settingsOpen?'stp open':'stp';}
function renderSettings(){
    var h='<div class="stp-inner"><div class="stp-row"><span class="stp-label">'+t('language')+'</span><div class="stp-lang"><button class="stp-lb'+(LANG==='en'?' on':'')+'" onclick="setLang(\'en\')">EN</button><button class="stp-lb'+(LANG==='ja'?' on':'')+'" onclick="setLang(\'ja\')">日本語</button></div></div>';
    h+='<div class="stp-row"><span class="stp-label">'+t('sheetId')+'</span><input class="stp-sid" value="'+esc(sheetId)+'" placeholder="Google Sheet ID" onchange="sheetId=this.value.trim();localStorage.setItem(\'soroi_sid\',sheetId)"></div>';
    if(user&&user.isAdmin){h+='<div class="stp-divider"></div><div class="stp-row"><span class="stp-label">'+t('adminTools')+'</span><a class="stp-link" href="admin.html">'+svg('extlink')+' '+t('openAdmin')+'</a></div>';}
    h+='</div>';$('sec-settings').innerHTML=h;
}
function renderLogin(){$('sec-login').innerHTML='<div class="lgn"><div class="lgn-ic">'+svg('cart')+'</div><div class="lgn-h"><span>揃い</span> Soroi</div><div class="lgn-p">'+t('sub')+'</div><button class="lgn-btn" onclick="doLogin()">'+GL+' '+t('signIn')+'</button></div>';}

/* === HOME === */
function renderHome(){
    var h='<div class="home-hdr fade"><h2>'+t('selectUnit')+'</h2><p>'+t('selectUnitP')+'</p></div>';
    if(user)h+='<div class="info-bar fade"><div class="info-chip">📅 <b>'+today()+'</b></div><div class="info-chip">👤 <b>'+esc(user.name)+'</b></div></div>';
    h+='<div class="ugrid fade">';
    units.forEach(function(u){var c=u.color||'#2563eb';h+='<div class="ucard" onclick="openUnit(\''+u.id+'\')" style="border-top-color:'+c+'"><div class="ucard-ico" style="background:'+c+'12">'+esc(u.icon||'📦')+'</div><div class="ucard-b"><div class="ucard-n">'+esc(u.name)+'</div><div class="ucard-d">'+t('tapStart')+'</div></div><div class="ucard-a">'+svg('chev')+'</div></div>';});
    if(!units.length)h+='<div class="empty-msg">'+t('noUnits')+'</div>';
    h+='</div>';$('sec-home').innerHTML=h;
}
function goBack(){selUnit=null;bom=[];mode='bulk';searchQ='';nav('home');}
async function openUnit(id){
    if(!user){toast(t('loginFirst'),'err');doLogin();return;}
    selUnit=units.find(function(u){return u.id===id;});cart=[];mode='bulk';searchQ='';
    nav('pickup');
    $('sec-pickup').innerHTML='<div class="lc"><div class="spin"></div></div>';
    await loadBom(id);loadAllBom();renderPickup();
}

/* === PICKUP === */
function renderPickup(){
    if(!selUnit){$('sec-pickup').innerHTML='';return;}
    var childSet=new Set();bom.forEach(function(b){if(b.parent_id)childSet.add(b.parent_id);});
    var h='<div class="mode-bar fade"><div class="mode-btn'+(mode==='bulk'?' on':'')+'" onclick="mode=\'bulk\';renderPickup()">'+t('bulk')+'</div><div class="mode-btn'+(mode==='individual'?' on':'')+'" onclick="mode=\'individual\';renderPickup()">'+t('indiv')+'</div></div>';
    if(mode==='bulk')h+=buildBulk(childSet);else h+=buildIndiv(childSet);
    if(cart.length)h+=buildCart();
    $('sec-pickup').innerHTML=h;updateHeader();bindPickup();
}
function buildBulk(childSet){
    var groups=bom.filter(function(b){return childSet.has(b.id)&&b.level>=2;});
    var GC=['#2e7d32','#1565c0','#c62828','#6a1b9a','#e65100','#00838f','#f57f17','#4e342e','#283593','#bf360c'];
    var h='<div class="sub-list fade">';
    if(!groups.length){h+='<div class="empty-msg">'+(bom.length?t('noSub'):t('noBom'))+'</div></div>';return h;}
    groups.forEach(function(g,i){var leaves=getLeaves(g.id);h+='<div class="sub-card" data-sub="'+g.id+'"><div class="sub-ico" style="background:'+GC[i%GC.length]+'"></div><div class="sub-b"><div class="sub-n">'+esc(g.component)+'</div><div class="sub-d">'+(g.part_number?esc(g.part_number)+' · ':'')+'L'+g.level+'</div></div><div class="sub-cnt">'+leaves.length+' '+t('parts')+'</div><div class="sub-a">'+svg('chev')+'</div></div>';});
    h+='</div>';return h;
}
function buildIndiv(childSet){
    var leaves=bom.filter(function(b){return !childSet.has(b.id);});
    var fasteners={};leaves.forEach(function(b){var pn=(b.part_number||'').toUpperCase();if(/^CB[EST]/.test(pn)){var base=pn.replace(/-\d+$/,'');fasteners[base]=(fasteners[base]||0)+1;}});
    var chips=Object.keys(fasteners).sort();
    var h='<div class="search-wrap fade">';
    if(chips.length){h+='<div class="chip-wrap">';chips.forEach(function(c){h+='<div class="f-chip" data-chip="'+esc(c)+'">'+esc(c)+'</div>';});h+='</div>';}
    h+='<div class="search-box"><div class="search-ico">'+svg('search')+'</div><input class="search-in" id="searchIn" type="text" placeholder="'+t('searchPh')+'" value="'+esc(searchQ)+'" autocomplete="off"></div>';
    if(searchQ.length>=2){
        var q=searchQ.toLowerCase();
        var matches=leaves.filter(function(b){return(b.part_number||'').toLowerCase().indexOf(q)>=0||(b.component||'').toLowerCase().indexOf(q)>=0;}).slice(0,20);
        var others=[];units.forEach(function(ou){if(ou.id===selUnit.id)return;(allBom[ou.id]||[]).forEach(function(b){if((b.part_number||'').toLowerCase().indexOf(q)>=0||(b.component||'').toLowerCase().indexOf(q)>=0)others.push({b:b,unit:ou.name});});});
        if(matches.length){h+='<div style="padding:6px 0;font-size:.78rem;color:var(--t2);font-weight:600">'+matches.length+' in '+esc(selUnit.name)+':</div>';matches.forEach(function(b){h+='<div class="sub-card" data-addpart="'+b.id+'" style="padding:10px 14px"><div class="sub-b"><div class="sub-n" style="font-family:var(--mn)">'+esc(b.part_number||'—')+'</div><div class="sub-d">'+esc(b.component)+'</div></div><div class="sub-cnt">×'+b.qty+'</div><div class="sub-a">'+svg('plus')+'</div></div>';});}
        else if(!others.length)h+='<div class="empty-msg">'+t('notFound')+' "'+esc(searchQ)+'"</div>';
        if(others.length&&!matches.length){var unames=[...new Set(others.map(function(m){return m.unit;}))];h+='<div style="padding:10px;margin-top:8px;background:var(--ylw-bg);border:1.5px solid #fbbf24;border-radius:8px;font-size:.82rem">⚠️ <b>"'+esc(searchQ)+'"</b> '+t('foundIn')+' <b>'+esc(selUnit.name)+'</b>. '+t('foundInOther')+' <b>'+unames.join(', ')+'</b></div>';}
    }
    h+='</div>';return h;
}
function buildCart(){
    var h='<div class="cart fade"><div class="cart-hdr"><div class="cart-t">'+svg('cart')+' '+t('cart')+' <span class="cart-badge">'+cart.length+'</span></div><span class="cart-expand" onclick="cartOpen=!cartOpen;renderPickup()">'+(cartOpen?t('hide'):t('show'))+'</span></div>';
    h+='<div class="cart-items'+(cartOpen?' open':'')+'">';
    cart.forEach(function(c,i){h+='<div class="ci"><span class="ci-pn">'+esc(c.part_number||c.component)+'</span><span class="ci-qty">×'+c.qty+'</span><span class="ci-mode">'+c.mode+'</span><button class="ci-del" onclick="event.stopPropagation();cart.splice('+i+',1);renderPickup()">'+svg('x')+'</button></div>';});
    h+='</div><div class="cart-acts"><button class="cart-btn cart-clr" onclick="cart=[];renderPickup()">'+t('clear')+'</button><button class="cart-btn cart-sub" onclick="submitCart()">'+t('submit')+' ('+cart.length+')</button></div></div>';return h;
}
function bindPickup(){
    document.querySelectorAll('[data-sub]').forEach(function(el){el.onclick=function(){confirmBulk(el.dataset.sub);};});
    document.querySelectorAll('[data-addpart]').forEach(function(el){el.onclick=function(){addIndivPart(el.dataset.addpart);};});
    document.querySelectorAll('[data-chip]').forEach(function(el){el.onclick=function(){searchQ=el.dataset.chip;renderPickup();setTimeout(function(){var inp=$('searchIn');if(inp){inp.focus();inp.selectionStart=inp.value.length;}},50);};});
    var si=$('searchIn');if(si){si.oninput=function(){searchQ=this.value;renderPickup();setTimeout(function(){var inp=$('searchIn');if(inp){inp.focus();inp.selectionStart=inp.value.length;}},10);};}
}
function confirmBulk(gid){
    var g=bom.find(function(b){return b.id===gid;});if(!g)return;
    var leaves=getLeaves(gid);if(!leaves.length){toast('No parts','err');return;}
    var lh='<div class="cf-list">';leaves.forEach(function(p){lh+='<div class="cf-row"><span class="cf-pn">'+esc(p.part_number||'—')+'</span><span class="cf-nm">'+esc(p.component)+'</span><span class="cf-qty">×'+p.qty+'</span></div>';});lh+='</div>';
    modal('Bulk: '+g.component,t('addAll')+' '+leaves.length+' '+t('parts')+'?',lh,[{label:t('cancel'),cls:'mdc'},{label:t('addAll')+' ('+leaves.length+')',cls:'mdo',fn:function(){leaves.forEach(function(p){cart.push({part_number:p.part_number||'',component:p.component,qty:p.qty,mode:'bulk',group:g.component,unit:selUnit.name});});toast(t('added')+' '+leaves.length+' '+t('parts'),'ok');renderPickup();}}]);
}
function addIndivPart(bid){
    var b=bom.find(function(p){return p.id===bid;});if(!b)return;
    modal(t('addPart'),'<b>'+esc(b.part_number||b.component)+'</b>','<div style="margin-bottom:8px;font-size:.82rem;color:var(--t2)">'+esc(b.component)+'</div><input class="md-input" id="ind-qty" type="number" value="'+b.qty+'" min="1" placeholder="Quantity">',[{label:t('cancel'),cls:'mdc'},{label:t('addPart'),cls:'mdo',fn:function(){var qty=parseInt($('ind-qty').value)||1;cart.push({part_number:b.part_number||'',component:b.component,qty:qty,mode:'individual',group:'',unit:selUnit.name});toast(t('added')+': '+(b.part_number||b.component),'ok');searchQ='';renderPickup();}}]);
}

/* === SHEETS === */
async function submitCart(){
    if(!cart.length){toast(t('cartEmpty'),'err');return;}
    if(!sheetId){modal(t('sheetId'),t('sheetReq'),'<input class="md-input" id="sub-sid" placeholder="Sheet ID" value="'+esc(sheetId)+'">',[{label:t('cancel'),cls:'mdc'},{label:t('saveSubmit'),cls:'mdo',fn:function(){sheetId=$('sub-sid').value.trim();localStorage.setItem('soroi_sid',sheetId);if(sheetId)submitCart();}}]);return;}
    if(!sTk){if(gisC)gisC.requestAccessToken();toast(t('connected')+'...','');return;}
    toast(t('submitting')+' '+cart.length+' '+t('items')+'...','');
    try{
        var tab=selUnit?selUnit.name:'Pickup';
        var info=await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'?fields=sheets.properties.title');
        if(!info.sheets.some(function(s){return s.properties.title===tab;})){
            await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+':batchUpdate',{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})});
            await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A1:H1?valueInputOption=RAW',{method:'PUT',body:JSON.stringify({values:[['Date','Time','Operator','Part Number','Description','Qty','Mode','Sub-Assembly']]})});}
        var col=await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A:A');
        var nr=(col.values?col.values.length:0)+1;
        var rows=cart.map(function(c){return[today(),nowTime(),user?user.name:'',c.part_number,c.component,c.qty,c.mode,c.group||''];});
        await sApi('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/'+encodeURIComponent(tab)+'!A'+nr+':H'+(nr+rows.length-1)+'?valueInputOption=USER_ENTERED',{method:'PUT',body:JSON.stringify({values:rows})});
        toast('✅ '+cart.length+' '+t('items')+' → "'+tab+'"','ok');cart=[];cartOpen=false;renderPickup();
    }catch(e){console.error(e);if(e.message&&e.message.indexOf('401')>=0){sTk=null;localStorage.removeItem('soroi_stk');if(gisC)gisC.requestAccessToken();toast(t('reauth'),'');}else toast(t('failed')+' '+e.message,'err');}
}
async function sApi(url,opts){if(!sTk)throw new Error('No token');var r=await fetch(url,Object.assign({headers:{'Authorization':'Bearer '+sTk,'Content-Type':'application/json'}},opts||{}));if(!r.ok){var tx=await r.text();throw new Error(r.status+': '+tx);}return r.json();}
function getLeaves(pid){var out=[];bom.forEach(function(b){if(isDesc(b.id,pid)&&!bom.some(function(c){return c.parent_id===b.id;}))out.push(b);});return out;}
function isDesc(id,anc){var cur=bom.find(function(b){return b.id===id;});while(cur){if(cur.parent_id===anc)return true;cur=bom.find(function(b){return b.id===cur.parent_id;});}return false;}
</script>
